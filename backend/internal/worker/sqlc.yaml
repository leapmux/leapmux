version: "2"
sql:
  - engine: "sqlite"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "db"
        out: "generated/db"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          # Millisecond-floored, canonical-layout DATETIME types (#303). Type-
          # keyed: retypes every DATETIME param and result column. Column-keyed
          # enum overrides below take precedence where they apply.
          - db_type: "DATETIME"
            go_type:
              import: "github.com/leapmux/leapmux/internal/util/sqltime"
              type: "SQLiteTime"
          - db_type: "DATETIME"
            nullable: true
            go_type:
              import: "github.com/leapmux/leapmux/internal/util/sqltime"
              type: "SQLiteNullTime"
          - column: "messages.source"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "MessageSource"
          - column: "messages.content_compression"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "ContentCompression"
          - column: "worktree_tabs.tab_type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "TabType"
          - column: "agents.agent_provider"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "AgentProvider"
          - column: "messages.agent_provider"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "AgentProvider"
          - column: "messages.mark_type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "MarkType"
