version: "2"
sql:
  - engine: "sqlite"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "db"
        out: "generated/db"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          # Millisecond-floored, canonical-layout DATETIME types (#303). These
          # type-keyed entries retype every DATETIME param and result column;
          # the column-keyed enum overrides below take precedence where they
          # apply. The db_type matches the raw schema decltype text verbatim,
          # so the spelling is the uppercase "DATETIME" used in the migrations.
          - db_type: "DATETIME"
            go_type:
              import: "github.com/leapmux/leapmux/internal/util/sqltime"
              type: "SQLiteTime"
          - db_type: "DATETIME"
            nullable: true
            go_type:
              import: "github.com/leapmux/leapmux/internal/util/sqltime"
              type: "SQLiteNullTime"
          # Worker enums
          - column: "workers.status"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "WorkerStatus"
          # Worker notification enums
          - column: "worker_notifications.type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "NotificationType"
          - column: "worker_notifications.status"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "NotificationStatus"
          # Workspace section enums
          - column: "workspace_sections.section_type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "SectionType"
          - column: "workspace_sections.sidebar"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "Sidebar"
          # Workspace tab enum
          - column: "workspace_tabs.tab_type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "TabType"
