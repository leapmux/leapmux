version: "2"
sql:
  - engine: "mysql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "db"
        out: "generated/db"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          # Worker enums
          - column: "workers.status"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "WorkerStatus"
          # Worker notification enums
          - column: "worker_notifications.type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "NotificationType"
          - column: "worker_notifications.status"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "NotificationStatus"
          # Workspace section enums
          - column: "workspace_sections.section_type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "SectionType"
          - column: "workspace_sections.sidebar"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "Sidebar"
          # Org member enum
          - column: "org_members.role"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "OrgMemberRole"
          # Workspace tab enum
          - column: "workspace_tabs.tab_type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "TabType"
          # Force binary token-hash columns to []byte (sqlc would map
          # MySQL VARBINARY to NullString otherwise, which is awkward
          # for HMAC bytes).
          - column: "api_tokens.secret_hash"
            go_type:
              type: "byte"
              slice: true
          - column: "api_tokens.refresh_hash"
            go_type:
              type: "byte"
              slice: true
          - column: "api_tokens.previous_refresh_hash"
            go_type:
              type: "byte"
              slice: true
          - column: "delegation_tokens.secret_hash"
            go_type:
              type: "byte"
              slice: true
          - column: "delegation_tokens.refresh_hash"
            go_type:
              type: "byte"
              slice: true
          - column: "delegation_tokens.previous_refresh_hash"
            go_type:
              type: "byte"
              slice: true
