version: "2"
sql:
  - engine: "mysql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "db"
        out: "generated/db"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          # Millisecond-floored DATETIME types (#303). Type-keyed: retypes every
          # DATETIME param and result column. mysql strips the precision suffix,
          # so "datetime" covers both DATETIME(3) and DATETIME(6) columns. The
          # column-keyed overrides below take precedence where they apply.
          # sqlc silently ignores an override that matches nothing, so the
          # decltype spelling this key relies on is pinned statically by
          # TestEveryTimestampColumnDeclaresDatetime (schema_internal_test.go).
          - db_type: "datetime"
            go_type:
              import: "github.com/leapmux/leapmux/internal/util/sqltime"
              type: "MySQLTime"
          - db_type: "datetime"
            nullable: true
            go_type:
              import: "github.com/leapmux/leapmux/internal/util/sqltime"
              type: "MySQLNullTime"
          # Worker enums
          - column: "workers.status"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "WorkerStatus"
          # Worker notification enums
          - column: "worker_notifications.type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "NotificationType"
          - column: "worker_notifications.status"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "NotificationStatus"
          # Workspace section enums
          - column: "workspace_sections.section_type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "SectionType"
          - column: "workspace_sections.sidebar"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "Sidebar"
          # Workspace tab enum
          - column: "workspace_tabs.tab_type"
            go_type:
              import: "github.com/leapmux/leapmux/generated/proto/leapmux/v1"
              type: "TabType"
          # Force binary token-hash columns to []byte (sqlc would map
          # MySQL VARBINARY to NullString otherwise, which is awkward
          # for HMAC bytes).
          - column: "api_tokens.secret_hash"
            go_type:
              type: "byte"
              slice: true
          - column: "api_tokens.refresh_hash"
            go_type:
              type: "byte"
              slice: true
          - column: "api_tokens.previous_refresh_hash"
            go_type:
              type: "byte"
              slice: true
          - column: "delegation_tokens.secret_hash"
            go_type:
              type: "byte"
              slice: true
          - column: "delegation_tokens.refresh_hash"
            go_type:
              type: "byte"
              slice: true
