name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (X.Y.Z format, e.g. 1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in X.Y.Z format (e.g. 1.0.0), got '${{ inputs.version }}'"
            exit 1
          fi

      - name: Derive next development version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ inputs.version }}"
          echo "dev_version=${major}.${minor}.$((patch + 1))-dev" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: |
          yq -i '.version = "${{ inputs.version }}"' versions.yaml
          git add versions.yaml
          git commit -m "chore: release v${{ inputs.version }}"

      - name: Create tag
        run: git tag "v${{ inputs.version }}"

      - name: Push release commit and tag
        run: git push origin HEAD "v${{ inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes

      - name: Bump to next development version
        run: |
          yq -i '.version = "${{ steps.next.outputs.dev_version }}"' versions.yaml
          git add versions.yaml
          git commit -m "chore: bump version to ${{ steps.next.outputs.dev_version }}"
          git push origin HEAD

  docker:
    needs: release
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        variant: [alpine, ubuntu]
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Read tool versions and git metadata
        run: |
          echo "BUF_VERSION=$(yq '.buf-version' versions.yaml)" >> $GITHUB_ENV
          echo "SQLC_VERSION=$(yq '.sqlc-version' versions.yaml)" >> $GITHUB_ENV
          echo "TASK_VERSION=$(yq '.task-version' versions.yaml)" >> $GITHUB_ENV
          echo "S6_OVERLAY_VERSION=$(yq '.s6-overlay-version' versions.yaml)" >> $GITHUB_ENV
          echo "ALPINE_IMAGE=$(yq '.alpine-image' versions.yaml)" >> $GITHUB_ENV
          echo "UBUNTU_IMAGE=$(yq '.ubuntu-image' versions.yaml)" >> $GITHUB_ENV
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_TIME=$(git log -1 --format=%cI)" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (per-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: false
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BASE_IMAGE=${{ matrix.variant == 'alpine' && env.ALPINE_IMAGE || env.UBUNTU_IMAGE }}
            BUF_VERSION=${{ env.BUF_VERSION }}
            SQLC_VERSION=${{ env.SQLC_VERSION }}
            TASK_VERSION=${{ env.TASK_VERSION }}
            S6_OVERLAY_VERSION=${{ env.S6_OVERLAY_VERSION }}
            VERSION=${{ inputs.version }}
            COMMIT_HASH=${{ env.COMMIT_HASH }}
            COMMIT_TIME=${{ env.COMMIT_TIME }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests/${{ matrix.variant }}
          echo "${{ steps.build.outputs.digest }}" > "${{ runner.temp }}/digests/${{ matrix.variant }}/${{ matrix.arch }}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: release-digest-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/${{ matrix.variant }}/
          retention-days: 1

  docker-merge:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            suffix: ''
          - variant: ubuntu
            suffix: '-ubuntu'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: release-digest-${{ matrix.variant }}-*
          path: ${{ runner.temp }}/digests/${{ matrix.variant }}
          merge-multiple: true

      - name: Derive major.minor tag
        id: tags
        run: |
          IFS='.' read -r major minor _patch <<< "${{ inputs.version }}"
          echo "major_minor=${major}.${minor}" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifests
        run: |
          DIGESTS=""
          for f in ${{ runner.temp }}/digests/${{ matrix.variant }}/*; do
            DIGESTS="$DIGESTS ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$(cat "$f")"
          done
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SUFFIX="${{ matrix.suffix }}"
          docker buildx imagetools create \
            -t "${IMAGE}:${{ inputs.version }}${SUFFIX}" \
            -t "${IMAGE}:${{ steps.tags.outputs.major_minor }}${SUFFIX}" \
            -t "${IMAGE}:latest${SUFFIX}" \
            $DIGESTS
