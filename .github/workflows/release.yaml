name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (X.Y.Z format, e.g. 1.0.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Opt arduino/setup-protoc, arduino/setup-task, and bufbuild/buf-setup-action
  # into Node.js 24 ahead of GitHub's June 2 2026 forced switch — those three
  # still ship `using: node20` in their action.yml. Drop this once they cut
  # Node-24 releases (or once the forced-switch date passes and the override
  # becomes a no-op).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    # Belt-and-braces: the apple-signing environment used by the desktop-artifacts
    # call below already restricts secrets to runs targeting `main`, but we also
    # refuse to dispatch any sensitive job from a non-main ref so the entire
    # release pipeline cannot run from a feature branch by accident.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in X.Y.Z format (e.g. 1.0.0), got '${{ inputs.version }}'"
            exit 1
          fi

      - name: Derive next development version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ inputs.version }}"
          echo "dev_version=${major}.${minor}.$((patch + 1))-dev" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set release version
        run: |
          sed -i -E 's|^VERSION=.*|VERSION=${{ inputs.version }}|' versions.env
          git add versions.env
          git commit -m "chore: release v${{ inputs.version }}"

      - name: Create tag
        run: git tag "v${{ inputs.version }}"

      - name: Push release commit and tag
        run: git push origin HEAD "v${{ inputs.version }}"

      - name: Create GitHub Release (draft)
        # Create as a draft so users don't see a release with missing assets
        # while desktop builds, signing, notarization, and docker pushes are
        # still in flight. The publish-release job below flips draft=false
        # only after all artifacts have been attached and all images pushed.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            --draft

      - name: Bump to next development version
        run: |
          sed -i -E 's|^VERSION=.*|VERSION=${{ steps.next.outputs.dev_version }}|' versions.env
          git add versions.env
          git commit -m "chore: bump version to ${{ steps.next.outputs.dev_version }}"
          git push origin HEAD

  desktop-artifacts:
    # Build, sign, and notarize the desktop binaries that get attached to
    # the v<version> stable release. Reuses the same workflow ci.yaml uses
    # for prereleases so prerelease and stable end up with identical asset
    # sets. Apple secrets are scoped to the apple-signing environment used
    # only by the macos-app-sign job inside this reusable workflow.
    #
    # See ci.yaml's matching call site for why `secrets: inherit` is
    # required — env-scoped secrets do not flow into a `workflow_call`
    # target without it, even for jobs that declare the environment.
    needs: release
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/desktop-artifacts.yaml
    with:
      ref: v${{ inputs.version }}
      version: ${{ inputs.version }}
      sign_macos: true
    secrets: inherit

  attach-desktop-artifacts:
    # Upload the built+signed binaries to the (still draft) release.
    needs: desktop-artifacts
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ inputs.version }}" \
            artifacts/*.tar.gz \
            artifacts/*.zip \
            artifacts/*.AppImage \
            artifacts/*.deb \
            artifacts/*.dmg \
            artifacts/*.msi \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  docker:
    needs: release
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        variant: [alpine, ubuntu]
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v5
        with:
          ref: v${{ inputs.version }}

      - name: Load tool versions and git metadata
        run: |
          grep -E '^[A-Z_][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "COMMIT_TIME=$(git log -1 --format=%cI)" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (per-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: false
          outputs: type=image,"name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BASE_IMAGE=${{ matrix.variant == 'alpine' && env.ALPINE_IMAGE || env.UBUNTU_IMAGE }}
            BUF_VERSION=${{ env.BUF_VERSION }}
            TASK_VERSION=${{ env.TASK_VERSION }}
            S6_OVERLAY_VERSION=${{ env.S6_OVERLAY_VERSION }}
            BUN_VERSION=${{ env.BUN_VERSION }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            GOLANG_VERSION=${{ env.GOLANG_VERSION }}
            VERSION=${{ inputs.version }}
            COMMIT_HASH=${{ env.COMMIT_HASH }}
            COMMIT_TIME=${{ env.COMMIT_TIME }}
          cache-from: type=gha,scope=${{ matrix.variant }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests/${{ matrix.variant }}
          echo "${{ steps.build.outputs.digest }}" > "${{ runner.temp }}/digests/${{ matrix.variant }}/${{ matrix.arch }}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: release-digest-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/${{ matrix.variant }}/
          retention-days: 1

  docker-merge:
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            suffix: ''
          - variant: ubuntu
            suffix: '-ubuntu'

    steps:
      - uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: release-digest-${{ matrix.variant }}-*
          path: ${{ runner.temp }}/digests/${{ matrix.variant }}
          merge-multiple: true

      - name: Derive major version tag
        id: tags
        run: |
          IFS='.' read -r major _minor _patch <<< "${{ inputs.version }}"
          echo "major=${major}" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifests
        run: |
          DIGESTS=""
          for f in ${{ runner.temp }}/digests/${{ matrix.variant }}/*; do
            DIGESTS="$DIGESTS ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@$(cat "$f")"
          done
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          SUFFIX="${{ matrix.suffix }}"
          docker buildx imagetools create \
            -t "${IMAGE}:${{ inputs.version }}${SUFFIX}" \
            -t "${IMAGE}:${{ steps.tags.outputs.major }}${SUFFIX}" \
            -t "${IMAGE}:latest${SUFFIX}" \
            $DIGESTS

  publish-release:
    # Flip the v<version> release from draft to published only after BOTH
    # desktop binaries are attached AND multi-arch container images are
    # pushed. If either side fails, the release stays draft so users never
    # see a half-shipped tag.
    needs: [attach-desktop-artifacts, docker-merge]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "v${{ inputs.version }}" --draft=false --repo "${GITHUB_REPOSITORY}"
