name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive cache epoch
        run: echo "CACHE_WEEK=$(date -u +%G-W%V)" >> "$GITHUB_ENV"

      - name: Read tool versions
        run: |
          echo "BUF_VERSION=$(yq '.buf-version' versions.yaml)" >> $GITHUB_ENV
          echo "SQLC_VERSION=$(yq '.sqlc-version' versions.yaml)" >> $GITHUB_ENV
          echo "GOLANGCI_LINT_VERSION=$(yq '.golangci-lint-version' versions.yaml)" >> $GITHUB_ENV
          echo "BUN_VERSION=$(yq '.bun-version' versions.yaml)" >> $GITHUB_ENV
          echo "NODE_VERSION=$(yq '.node-version' versions.yaml)" >> $GITHUB_ENV
          echo "GOLANG_VERSION=$(yq '.golang-version' versions.yaml)" >> $GITHUB_ENV
          echo "RUST_VERSION=$(yq '.rust-version' versions.yaml)" >> $GITHUB_ENV
          echo "TASK_VERSION=$(yq '.task-version' versions.yaml)" >> $GITHUB_ENV

      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: .apt-cache
          key: apt-${{ runner.os }}-${{ env.CACHE_WEEK }}-${{ hashFiles('.github/workflows/ci.yaml') }}

      - name: Configure APT cache directories
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.apt-cache/archives/partial"
          mkdir -p "$GITHUB_WORKSPACE/.apt-cache/lists/partial"
          sudo rm -f /etc/apt/apt.conf.d/docker-clean
          cat <<EOF | sudo tee /etc/apt/apt.conf.d/99github-cache
          Binary::apt::APT::Keep-Downloaded-Packages "true";
          Dir::Cache::archives "$GITHUB_WORKSPACE/.apt-cache/archives";
          Dir::State::lists "$GITHUB_WORKSPACE/.apt-cache/lists";
          EOF

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            protobuf-compiler

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache-dependency-path: |
            backend/go.sum
            desktop/go/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('desktop/rust/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Cache Tauri downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/tauri
          key: tauri-${{ runner.os }}-${{ env.CACHE_WEEK }}

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Cache Go tool binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-sqlc${{ env.SQLC_VERSION }}-golangci${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install tools
        run: |
          test -x "$(go env GOPATH)/bin/sqlc" || go install github.com/sqlc-dev/sqlc/cmd/sqlc@v${{ env.SQLC_VERSION }}
          test -x "$(go env GOPATH)/bin/golangci-lint" || curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v${{ env.GOLANGCI_LINT_VERSION }}

      - name: Generate code (proto + sqlc)
        run: task generate

      - name: Install frontend dependencies
        run: task prepare-frontend

      - name: Lint
        run: task lint

      - name: Build
        run: task build

      - name: Test
        run: task test

  ci-windows:
    runs-on: windows-latest
    # windows-latest runner behaviour is still being validated; failures
    # are reported but not merge-blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Read tool versions
        shell: bash
        run: |
          echo "GOLANG_VERSION=$(yq '.golang-version' versions.yaml)" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Backend tests (Windows-relevant packages)
        shell: bash
        working-directory: backend
        run: |
          # Excludes hub/store/{cockroachdb,mysql,postgres,tidb,yugabytedb}
          # which require Docker (testcontainers) and are not part of the
          # Windows worker/desktop runtime.
          go test -tags integration -timeout 10m \
            ./cmd/... \
            ./channelwire/... \
            ./hub/... \
            ./internal/config/... \
            ./internal/hub/auth/... \
            ./internal/hub/bootstrap/... \
            ./internal/hub/channelmgr/... \
            ./internal/hub/cleanup/... \
            ./internal/hub/config/... \
            ./internal/hub/keystore/... \
            ./internal/hub/layout/... \
            ./internal/hub/oauth/... \
            ./internal/hub/password/... \
            ./internal/hub/service/... \
            ./internal/hub/store/sqlite/... \
            ./internal/hub/store/sqlutil/... \
            ./internal/hub/workermgr/... \
            ./internal/logging/... \
            ./internal/metrics/... \
            ./internal/noise/... \
            ./internal/util/... \
            ./internal/worker/... \
            ./locallisten/... \
            ./solo/... \
            ./spautil/... \
            ./tunnel/... \
            ./worker/...

  docker:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read tool versions and git metadata
        run: |
          echo "BUF_VERSION=$(yq '.buf-version' versions.yaml)" >> $GITHUB_ENV
          echo "SQLC_VERSION=$(yq '.sqlc-version' versions.yaml)" >> $GITHUB_ENV
          echo "TASK_VERSION=$(yq '.task-version' versions.yaml)" >> $GITHUB_ENV
          echo "S6_OVERLAY_VERSION=$(yq '.s6-overlay-version' versions.yaml)" >> $GITHUB_ENV
          echo "ALPINE_IMAGE=$(yq '.alpine-image' versions.yaml)" >> $GITHUB_ENV
          echo "BUN_VERSION=$(yq '.bun-version' versions.yaml)" >> $GITHUB_ENV
          echo "NODE_VERSION=$(yq '.node-version' versions.yaml)" >> $GITHUB_ENV
          echo "GOLANG_VERSION=$(yq '.golang-version' versions.yaml)" >> $GITHUB_ENV
          echo "VERSION=$(yq '.version' versions.yaml)" >> $GITHUB_ENV
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_TIME=$(git log -1 --format=%cI)" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (dry run)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            BASE_IMAGE=${{ env.ALPINE_IMAGE }}
            BUF_VERSION=${{ env.BUF_VERSION }}
            SQLC_VERSION=${{ env.SQLC_VERSION }}
            TASK_VERSION=${{ env.TASK_VERSION }}
            S6_OVERLAY_VERSION=${{ env.S6_OVERLAY_VERSION }}
            BUN_VERSION=${{ env.BUN_VERSION }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            GOLANG_VERSION=${{ env.GOLANG_VERSION }}
            VERSION=${{ env.VERSION }}
            COMMIT_HASH=${{ env.COMMIT_HASH }}
            COMMIT_TIME=${{ env.COMMIT_TIME }}
          cache-from: type=gha,scope=alpine
          cache-to: type=gha,mode=max,scope=ci-docker
