name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    # UBUNTU VERSION: the `ubuntu-24.04` literal below is the single source of
    # truth for the Linux CI base image. Bump it here when moving to a newer
    # Ubuntu release; no other occurrence exists in this workflow.
    runs-on: ubuntu-24.04${{ matrix.runner_suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner_suffix: ''
          - arch: arm64
            runner_suffix: '-arm'
    steps:
      - uses: actions/checkout@v4

      - name: Derive cache epoch
        run: echo "CACHE_WEEK=$(date -u +%G-W%V)" >> "$GITHUB_ENV"

      - name: Read tool versions
        run: |
          echo "BUF_VERSION=$(yq '.buf-version' versions.yaml)" >> $GITHUB_ENV
          echo "GOLANGCI_LINT_VERSION=$(yq '.golangci-lint-version' versions.yaml)" >> $GITHUB_ENV
          echo "BUN_VERSION=$(yq '.bun-version' versions.yaml)" >> $GITHUB_ENV
          echo "NODE_VERSION=$(yq '.node-version' versions.yaml)" >> $GITHUB_ENV
          echo "GOLANG_VERSION=$(yq '.golang-version' versions.yaml)" >> $GITHUB_ENV
          echo "RUST_VERSION=$(yq '.rust-version' versions.yaml)" >> $GITHUB_ENV
          echo "TASK_VERSION=$(yq '.task-version' versions.yaml)" >> $GITHUB_ENV

      - name: Cache APT packages
        uses: actions/cache@v4
        with:
          path: .apt-cache
          key: apt-${{ runner.os }}-${{ runner.arch }}-${{ env.CACHE_WEEK }}-${{ hashFiles('.github/workflows/ci.yaml') }}

      - name: Configure APT cache directories
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.apt-cache/archives/partial"
          mkdir -p "$GITHUB_WORKSPACE/.apt-cache/lists/partial"
          sudo rm -f /etc/apt/apt.conf.d/docker-clean
          cat <<EOF | sudo tee /etc/apt/apt.conf.d/99github-cache
          Binary::apt::APT::Keep-Downloaded-Packages "true";
          Dir::Cache::archives "$GITHUB_WORKSPACE/.apt-cache/archives";
          Dir::State::lists "$GITHUB_WORKSPACE/.apt-cache/lists";
          EOF

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libsoup-3.0-dev \
            protobuf-compiler \
            xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache-dependency-path: |
            backend/go.sum
            desktop/go/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/rust/target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('desktop/rust/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Tauri downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/tauri
          key: tauri-${{ runner.os }}-${{ runner.arch }}-${{ env.CACHE_WEEK }}

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}
          # Authenticate the action's GitHub API calls (listing releases,
          # downloading assets) so it doesn't hit the 60/hr unauthenticated
          # rate limit on shared-IP macOS runners.
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Cache Go tool binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ runner.arch }}-sqlc-${{ hashFiles('backend/go.mod') }}-golangci${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install tools
        run: |
          # sqlc is declared as a tool dep in backend/go.mod; installing from
          # inside the module avoids the `@version`-form error caused by
          # sqlc's own replace directives.
          test -x "$(go env GOPATH)/bin/sqlc" || (cd backend && go install github.com/sqlc-dev/sqlc/cmd/sqlc)
          test -x "$(go env GOPATH)/bin/golangci-lint" || curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v${{ env.GOLANGCI_LINT_VERSION }}

      - name: Generate code (proto + sqlc)
        run: task generate

      - name: Install frontend dependencies
        run: task prepare-frontend

      - name: Build
        run: task build

      - name: Diagnose linuxdeploy (on failure)
        # Tauri captures linuxdeploy's stdout/stderr and silently discards
        # them on failure, leaving only "failed to run linuxdeploy" in the
        # log. Re-run the wrapper and the extracted AppRun directly so
        # their real output surfaces in the CI log. Runs only if a
        # preceding step failed, so the success path stays quiet.
        if: failure()
        run: |
          set +e
          echo "=== ~/.cache/tauri contents ==="
          ls -la ~/.cache/tauri/
          echo
          echo "=== Tauri's AppImage bundle dir ==="
          ls -la desktop/rust/target/release/bundle/appimage/ 2>/dev/null
          echo
          echo "=== linuxdeploy wrapper --version (exit=?) ==="
          ~/.cache/tauri/linuxdeploy-$(uname -m).AppImage --version
          echo "wrapper exit=$?"
          echo
          echo "=== extracted AppRun --list-plugins (exit=?) ==="
          ~/.cache/tauri/linuxdeploy-extracted/AppRun --list-plugins
          echo "AppRun exit=$?"
          echo
          echo "=== Re-run linuxdeploy against Tauri's partial AppDir ==="
          # Tauri suppresses linuxdeploy's stdout/stderr on failure; invoking
          # it directly against the AppDir it already populated surfaces the
          # actual error.
          appdir="$(ls -d desktop/rust/target/release/bundle/appimage/*.AppDir 2>/dev/null | head -1)"
          if [ -n "$appdir" ]; then
            echo "appdir=$appdir"
            ~/.cache/tauri/linuxdeploy-$(uname -m).AppImage \
              --appdir "$appdir" \
              --output appimage \
              --plugin gtk 2>&1 | tail -80
            echo "direct linuxdeploy exit=${PIPESTATUS[0]}"
          else
            echo "No AppDir found — Tauri didn't reach the linuxdeploy step."
          fi
          echo
          echo "=== Go sidecar linkage (source copy) ==="
          src_sidecar="$(ls desktop/go/bin/leapmux-desktop-service-* 2>/dev/null | head -1)"
          if [ -n "$src_sidecar" ]; then
            echo "path=$src_sidecar"
            file "$src_sidecar"
            echo "--- readelf -l | grep INTERP ---"
            readelf -l "$src_sidecar" 2>&1 | grep -E 'INTERP|interpreter' || echo "(no INTERP segment — static binary)"
            echo "--- ldd output ---"
            ldd "$src_sidecar" 2>&1
            echo "ldd exit=$?"
          else
            echo "No sidecar found under desktop/go/bin/"
          fi
          echo
          echo "=== Go sidecar linkage (AppDir copy) ==="
          ad_sidecar="$(find "$appdir" -name 'leapmux-desktop-service-*' 2>/dev/null | head -1)"
          if [ -n "$ad_sidecar" ]; then
            echo "path=$ad_sidecar"
            file "$ad_sidecar"
            ldd "$ad_sidecar" 2>&1
            echo "ldd exit=$?"
          else
            echo "No sidecar found inside AppDir."
          fi
          echo
          echo "=== Toolchain sanity ==="
          echo "gcc: $(command -v gcc) $(gcc --version 2>/dev/null | head -1)"
          echo "CGO_ENABLED (go env): $(go env CGO_ENABLED)"
          echo "/lib/ld-linux-aarch64.so.1: $(ls -la /lib/ld-linux-aarch64.so.1 2>&1 || true)"

      - name: Test (full)
        if: matrix.arch == 'amd64'
        # `task test` lints and tests every module — amd64 is the canonical
        # runner, so it exercises the full suite including the Docker-backed
        # storage backends (postgres/mysql/cockroachdb/tidb/yugabytedb).
        run: task test

      - name: Test (no Docker-backed storage)
        if: matrix.arch == 'arm64'
        # testcontainers-backed tests for postgres/mysql/cockroachdb/tidb/
        # yugabytedb exercise SQL-dialect glue, not the runner arch. Skip
        # them on arm64 (and macOS/Windows) to save minutes and reduce
        # flake surface; amd64 still runs the full suite every commit.
        run: task test-no-docker

      - name: Package CLI server tarball
        run: |
          VERSION=$(yq '.version' versions.yaml)
          DIR="leapmux_${VERSION}_linux_${{ matrix.arch }}"
          mkdir -p "dist/${DIR}"
          cp leapmux LICENSE.md NOTICE.md "dist/${DIR}/"
          tar -czf "${DIR}.tar.gz" -C dist "${DIR}"

      - name: Upload release artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ matrix.arch }}
          path: |
            leapmux_*_linux_${{ matrix.arch }}.tar.gz
            leapmux-desktop*.AppImage
            leapmux-desktop*.deb
          if-no-files-found: error
          retention-days: 7

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive cache epoch
        run: echo "CACHE_WEEK=$(date -u +%G-W%V)" >> "$GITHUB_ENV"

      - name: Read tool versions
        run: |
          echo "BUF_VERSION=$(yq '.buf-version' versions.yaml)" >> $GITHUB_ENV
          echo "GOLANGCI_LINT_VERSION=$(yq '.golangci-lint-version' versions.yaml)" >> $GITHUB_ENV
          echo "BUN_VERSION=$(yq '.bun-version' versions.yaml)" >> $GITHUB_ENV
          echo "NODE_VERSION=$(yq '.node-version' versions.yaml)" >> $GITHUB_ENV
          echo "GOLANG_VERSION=$(yq '.golang-version' versions.yaml)" >> $GITHUB_ENV
          echo "RUST_VERSION=$(yq '.rust-version' versions.yaml)" >> $GITHUB_ENV
          echo "TASK_VERSION=$(yq '.task-version' versions.yaml)" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache-dependency-path: |
            backend/go.sum
            desktop/go/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/rust/target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('desktop/rust/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Tauri downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/tauri
          key: tauri-${{ runner.os }}-${{ runner.arch }}-${{ env.CACHE_WEEK }}

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}
          # Authenticate the action's GitHub API calls (listing releases,
          # downloading assets) so it doesn't hit the 60/hr unauthenticated
          # rate limit on shared-IP macOS runners.
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup protoc
        # Tauri/Rust's prost-build invokes protoc directly; the Linux job
        # gets it from `apt install protobuf-compiler`.
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Cache Go tool binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ runner.arch }}-sqlc-${{ hashFiles('backend/go.mod') }}-golangci${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install tools
        run: |
          # sqlc is declared as a tool dep in backend/go.mod; installing from
          # inside the module avoids the `@version`-form error caused by
          # sqlc's own replace directives.
          test -x "$(go env GOPATH)/bin/sqlc" || (cd backend && go install github.com/sqlc-dev/sqlc/cmd/sqlc)
          test -x "$(go env GOPATH)/bin/golangci-lint" || curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin v${{ env.GOLANGCI_LINT_VERSION }}

      - name: Generate code (proto + sqlc)
        run: task generate

      - name: Install frontend dependencies
        run: task prepare-frontend

      - name: Test (no Docker-backed storage)
        # `task test-no-docker` lints and tests frontend/backend/desktop
        # with the Docker-backed storage backends excluded — amd64 Linux
        # still runs the full suite on every commit.
        run: task test-no-docker

      - name: Build
        # MACOS_CODESIGN_IDENTITY is intentionally left unset; the Taskfile
        # falls back to ad-hoc signing (Taskfile.yaml:308-314). Real notarized
        # signing for public release is a separate follow-up.
        run: task build

      - name: Package CLI server tarball
        run: |
          VERSION=$(yq '.version' versions.yaml)
          DIR="leapmux_${VERSION}_darwin_arm64"
          mkdir -p "dist/${DIR}"
          cp leapmux LICENSE.md NOTICE.md "dist/${DIR}/"
          tar -czf "${DIR}.tar.gz" -C dist "${DIR}"

      - name: Upload release artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            leapmux_*_darwin_arm64.tar.gz
            LeapMuxDesktop_*.dmg
          if-no-files-found: error
          retention-days: 7

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        # windows-latest does not ship mikefarah/yq; without it the
        # `Read tool versions` step below silently produces empty values
        # because bash command substitution swallows the missing-binary
        # failure inside `echo "FOO=$(yq ...)"`.
        shell: pwsh
        run: |
          winget install --id MikeFarah.yq -e `
            --source winget `
            --silent `
            --accept-package-agreements `
            --accept-source-agreements `
            --disable-interactivity
          # winget drops a yq.exe shim into %LOCALAPPDATA%\Microsoft\WinGet\Links,
          # but its PATH update only applies to new shells — the subsequent CI
          # steps inherit the job's original PATH, so yq wouldn't be found.
          # Surface the Links dir explicitly via GITHUB_PATH.
          "$env:LOCALAPPDATA\Microsoft\WinGet\Links" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Read tool versions
        shell: bash
        run: |
          echo "BUF_VERSION=$(yq '.buf-version' versions.yaml)" >> $GITHUB_ENV
          echo "GOLANGCI_LINT_VERSION=$(yq '.golangci-lint-version' versions.yaml)" >> $GITHUB_ENV
          echo "BUN_VERSION=$(yq '.bun-version' versions.yaml)" >> $GITHUB_ENV
          echo "NODE_VERSION=$(yq '.node-version' versions.yaml)" >> $GITHUB_ENV
          echo "GOLANG_VERSION=$(yq '.golang-version' versions.yaml)" >> $GITHUB_ENV
          echo "RUST_VERSION=$(yq '.rust-version' versions.yaml)" >> $GITHUB_ENV
          echo "TASK_VERSION=$(yq '.task-version' versions.yaml)" >> $GITHUB_ENV
          echo "CACHE_WEEK=$(date -u +%G-W%V)" >> $GITHUB_ENV

      - name: Setup MSVC dev environment
        # Puts link.exe, cl.exe, and the Windows SDK on PATH so Tauri's
        # Rust build (and any CGO packages) can link against MSVC.
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache-dependency-path: |
            backend/go.sum
            desktop/go/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('desktop/rust/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Cache Tauri downloads
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/tauri
          key: tauri-${{ runner.os }}-${{ env.CACHE_WEEK }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Setup buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: ${{ env.BUF_VERSION }}
          # Authenticate the action's GitHub API calls (listing releases,
          # downloading assets) so it doesn't hit the 60/hr unauthenticated
          # rate limit on shared-IP macOS runners.
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup protoc
        # Tauri/Rust's prost-build invokes protoc directly; the Linux job
        # gets it from `apt install protobuf-compiler`.
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Task
        uses: arduino/setup-task@v2
        with:
          version: ${{ env.TASK_VERSION }}

      - name: Cache Go tool binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-sqlc-${{ hashFiles('backend/go.mod') }}-golangci${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install tools
        shell: bash
        run: |
          # sqlc is declared as a tool dep in backend/go.mod; installing from
          # inside the module avoids the `@version`-form error caused by
          # sqlc's own replace directives.
          test -x "$(go env GOPATH)/bin/sqlc" || test -x "$(go env GOPATH)/bin/sqlc.exe" || (cd backend && go install github.com/sqlc-dev/sqlc/cmd/sqlc)
          # golangci-lint is needed because `task test-no-docker` runs
          # lint-backend/lint-desktop as deps on every platform.
          test -x "$(go env GOPATH)/bin/golangci-lint" || test -x "$(go env GOPATH)/bin/golangci-lint.exe" || curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" "v${{ env.GOLANGCI_LINT_VERSION }}"

      - name: Test (no Docker-backed storage)
        # Run under pwsh (not bash) for the same reason `task build` does:
        # Git Bash prepends /usr/bin to PATH, and /usr/bin/link.exe
        # shadows MSVC's link.exe, which breaks `cargo test` (invoked by
        # `task test-desktop`). pwsh inherits MSVC's PATH cleanly.
        shell: pwsh
        run: task test-no-docker

      - name: Build all modules
        # Run under pwsh rather than bash: Git Bash prepends /usr/bin to
        # PATH, and /usr/bin/link.exe (a Unix hard-link utility shipped
        # with Git for Windows) shadows MSVC's link.exe, causing the
        # Rust/Tauri build to fail with "/usr/bin/link: extra operand".
        shell: pwsh
        run: task build

      - name: Package CLI server zip
        shell: pwsh
        run: |
          $version = (yq '.version' versions.yaml)
          $dir = "leapmux_${version}_windows_amd64"
          New-Item -ItemType Directory -Path "dist/$dir" -Force | Out-Null
          Copy-Item leapmux.exe,LICENSE.md,NOTICE.md "dist/$dir"
          Compress-Archive -Path "dist/$dir" -DestinationPath "${dir}.zip" -Force

      - name: Upload release artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            leapmux_*_windows_amd64.zip
            LeapMuxDesktop_*.msi
          if-no-files-found: error
          retention-days: 7

  docker:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read tool versions and git metadata
        run: |
          echo "BUF_VERSION=$(yq '.buf-version' versions.yaml)" >> $GITHUB_ENV
          echo "TASK_VERSION=$(yq '.task-version' versions.yaml)" >> $GITHUB_ENV
          echo "S6_OVERLAY_VERSION=$(yq '.s6-overlay-version' versions.yaml)" >> $GITHUB_ENV
          echo "ALPINE_IMAGE=$(yq '.alpine-image' versions.yaml)" >> $GITHUB_ENV
          echo "BUN_VERSION=$(yq '.bun-version' versions.yaml)" >> $GITHUB_ENV
          echo "NODE_VERSION=$(yq '.node-version' versions.yaml)" >> $GITHUB_ENV
          echo "GOLANG_VERSION=$(yq '.golang-version' versions.yaml)" >> $GITHUB_ENV
          echo "VERSION=$(yq '.version' versions.yaml)" >> $GITHUB_ENV
          echo "COMMIT_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_TIME=$(git log -1 --format=%cI)" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build (dry run)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            BASE_IMAGE=${{ env.ALPINE_IMAGE }}
            BUF_VERSION=${{ env.BUF_VERSION }}
            TASK_VERSION=${{ env.TASK_VERSION }}
            S6_OVERLAY_VERSION=${{ env.S6_OVERLAY_VERSION }}
            BUN_VERSION=${{ env.BUN_VERSION }}
            NODE_VERSION=${{ env.NODE_VERSION }}
            GOLANG_VERSION=${{ env.GOLANG_VERSION }}
            VERSION=${{ env.VERSION }}
            COMMIT_HASH=${{ env.COMMIT_HASH }}
            COMMIT_TIME=${{ env.COMMIT_TIME }}
          cache-from: type=gha,scope=alpine
          cache-to: type=gha,mode=max,scope=ci-docker

  prerelease:
    needs: [linux, macos, windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git log <prev-prerelease>..HEAD` can
          # build the changelog block in the release notes below.
          fetch-depth: 0

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: desktop-*
          merge-multiple: true

      - name: Compute tag and write release notes
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          SHORT_SHA=${GITHUB_SHA::7}
          VERSION=$(yq '.version' versions.yaml)
          echo "tag=prerelease-${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          # Find the most recent auto-generated pre-release tag to bound
          # the changelog. Match the same strict regex the prune step
          # uses so stable `vX.Y.Z` releases are ignored.
          PREV_TAG=$(gh release list --limit 100 \
            --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease) | select(.tagName | test("^prerelease-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9a-f]{7}$"))] | sort_by(.createdAt) | reverse | .[0].tagName // empty')

          # Write the static part of the release notes. Unquoted heredoc
          # expands ${VERSION}/${GITHUB_SHA}; backticks are escaped so they
          # stay literal in the markdown instead of being re-parsed.
          cat > release-notes.md <<EOF
          Pre-release from commit ${GITHUB_SHA}.

          ## Artifacts

          - \`leapmux_${VERSION}_linux_amd64.tar.gz\` — LeapMux server binary for Linux (x86_64), with LICENSE.md and NOTICE.md.
          - \`leapmux_${VERSION}_linux_arm64.tar.gz\` — LeapMux server binary for Linux (ARM64), with LICENSE.md and NOTICE.md.
          - \`leapmux_${VERSION}_darwin_arm64.tar.gz\` — LeapMux server binary for macOS (Apple Silicon), with LICENSE.md and NOTICE.md.
          - \`leapmux_${VERSION}_windows_amd64.zip\` — LeapMux server binary for Windows (x86_64), with LICENSE.md and NOTICE.md.
          - \`leapmux-desktop_*_amd64.AppImage\` — LeapMux Desktop portable AppImage for Linux (x86_64).
          - \`leapmux-desktop_*_arm64.AppImage\` — LeapMux Desktop portable AppImage for Linux (ARM64).
          - \`leapmux-desktop_*_amd64.deb\` — LeapMux Desktop .deb package for Debian/Ubuntu (x86_64).
          - \`leapmux-desktop_*_arm64.deb\` — LeapMux Desktop .deb package for Debian/Ubuntu (ARM64).
          - \`LeapMuxDesktop_*_aarch64.dmg\` — LeapMux Desktop disk image for macOS (Apple Silicon).
          - \`LeapMuxDesktop_*_x64_en-US.msi\` — LeapMux Desktop MSI installer for Windows (x86_64).
          EOF

          # Append the changelog. Write the commit list via `git log` output
          # appended raw — avoids running commit subjects through another
          # round of shell parsing, so subjects containing backticks or
          # dollar signs stay intact in the rendered markdown.
          {
            echo
            if [ -n "$PREV_TAG" ] && git rev-parse --verify "$PREV_TAG" >/dev/null 2>&1; then
              echo "## Changes since \`${PREV_TAG}\`"
              echo
              git log --pretty=format:'- %s (%h)' "${PREV_TAG}..HEAD"
              echo
            else
              echo "## Recent changes"
              echo
              git log --pretty=format:'- %s (%h)' -20
              echo
            fi
          } >> release-notes.md

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "${{ steps.meta.outputs.tag }}" \
            --notes-file release-notes.md \
            artifacts/*.tar.gz \
            artifacts/*.zip \
            artifacts/*.AppImage \
            artifacts/*.deb \
            artifacts/*.dmg \
            artifacts/*.msi

      - name: Prune old pre-releases (keep latest 3)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Filter to auto-generated prereleases (isPrerelease=true AND tag
          # matches prerelease-YYYY-MM-DD-<7hexsha>), so manual releases from
          # the `Release` workflow (tags like `v1.2.3`) are never touched.
          # Sort newest first, drop the first 3, delete the rest
          # (tag + release).
          gh release list --limit 100 \
            --json tagName,isPrerelease,createdAt \
            --jq '[.[] | select(.isPrerelease) | select(.tagName | test("^prerelease-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9a-f]{7}$"))] | sort_by(.createdAt) | reverse | .[3:] | .[].tagName' \
            | while read -r tag; do
                [ -n "$tag" ] || continue
                echo "Deleting old pre-release: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done
