name: Publish site

# Builds the documentation site (Hugo + Hextra, under site/) and deploys it to
# the Cloudflare Worker "leapmux-site" (Workers Static Assets) on every push to
# main that touches the site.
#
# leapmux-site is a Worker, not a Pages project, so deployment uses
# `wrangler deploy` against site/wrangler.jsonc -- which holds the Worker name
# and the ./public assets directory.
#
# Configure a "cloudflare-publish" GitHub environment with:
#   - secret CLOUDFLARE_API_TOKEN   - API token with the "Workers Scripts: Edit"
#                                     permission (the dashboard's "Edit
#                                     Cloudflare Workers" template grants it)
#   - secret CLOUDFLARE_ACCOUNT_ID  - the Cloudflare account ID

on:
  push:
    branches: [main]
    # Only redeploy when the site (content, config, theme, or this workflow)
    # changes -- backend/frontend-only commits leave the published site current.
    # Remove this `paths` filter to deploy on every commit to main.
    paths:
      - "site/**"
      - ".github/workflows/publish-site.yaml"
  workflow_dispatch:

# One deploy at a time; let an in-flight deploy finish rather than cancelling it.
concurrency:
  group: publish-site
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: cloudflare-publish
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so Hugo's enableGitInfo derives accurate per-file
          # last-modified dates. A shallow clone dates every page with the
          # latest commit.
          fetch-depth: 0

      - name: Load tool versions
        run: grep -E '^[A-Z_][A-Z0-9_]*=' versions.env >> "$GITHUB_ENV"

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GOLANG_VERSION }}
          cache-dependency-path: site/go.sum

      - name: Build site
        # GOWORK=off isolates the site module from the root go.work (which lists
        # only ./backend and ./desktop/go). Hugo is a `go tool` dependency in
        # site/go.mod, so there is nothing extra to install.
        working-directory: site
        run: GOWORK=off go tool hugo --gc --minify

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin wrangler instead of letting the action float to the latest 4.x,
          # matching every other tool version in versions.env.
          wranglerVersion: ${{ env.WRANGLER_VERSION }}
          # Run wrangler in site/ so it picks up site/wrangler.jsonc, whose
          # ./public assets dir resolves relative to that file. This is a
          # Workers Static Assets deploy -- `wrangler deploy`, not `pages deploy`.
          workingDirectory: site
          command: deploy
