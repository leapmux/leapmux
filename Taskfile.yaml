version: '3'

run: once

vars:
  VERSION:
    sh: echo "${VERSION:-$(yq '.version' versions.yaml)}"
  COMMIT_HASH:
    sh: echo "${COMMIT_HASH:-$(git rev-parse --short HEAD 2>/dev/null)}"
  COMMIT_TIME:
    sh: echo "${COMMIT_TIME:-$(git log -1 --format=%cI 2>/dev/null)}"
  BUILD_TIME:
    sh: echo "${BUILD_TIME:-{{dateInZone `2006-01-02T15:04:05Z` now `UTC`}}}"
  VERSION_LDFLAGS: >-
    -X github.com/leapmux/leapmux/util/version.Value={{.VERSION}}
    -X github.com/leapmux/leapmux/util/version.CommitHash={{.COMMIT_HASH}}
    -X github.com/leapmux/leapmux/util/version.CommitTime={{.COMMIT_TIME}}
    -X github.com/leapmux/leapmux/util/version.BuildTime={{.BUILD_TIME}}
  ALPINE_IMAGE:
    sh: yq '.alpine-image' versions.yaml
  UBUNTU_IMAGE:
    sh: yq '.ubuntu-image' versions.yaml
  BUF_VERSION:
    sh: yq '.buf-version' versions.yaml
  S6_OVERLAY_VERSION:
    sh: yq '.s6-overlay-version' versions.yaml
  TASK_VERSION:
    sh: yq '.task-version' versions.yaml
  BUN_VERSION:
    sh: yq '.bun-version' versions.yaml
  NODE_VERSION:
    sh: yq '.node-version' versions.yaml
  GOLANG_VERSION:
    sh: yq '.golang-version' versions.yaml

# --- Code Generation ---

tasks:
  generate:
    desc: Generate all code
    cmds:
      - task: generate-proto
      - task: generate-sqlc
      - task: generate-spinners

  generate-proto:
    desc: Generate Protocol Buffer code
    sources:
      - proto/**/*
      - buf.gen.yaml
      - buf.yaml
    generates:
      - backend/generated/proto/**/*
      - frontend/src/generated/**/*
    cmds:
      - rm -rf backend/generated/proto/ frontend/src/generated/
      - buf generate

  generate-sqlc:
    desc: Generate all type-safe SQL code
    deps: [generate-sqlc-hub, generate-sqlc-worker]

  generate-sqlc-hub:
    desc: Generate type-safe SQL code for Hub
    deps: [generate-proto]
    vars:
      BACKENDS: sqlite postgres mysql
    sources:
      - backend/generated/proto/**/*
      - backend/internal/hub/store/*/sqlc.yaml
      - backend/internal/hub/store/*/db/**/*.sql
    generates:
      - backend/internal/hub/store/*/generated/db/**/*
    cmds:
      - for: { var: BACKENDS }
        cmd: rm -rf backend/internal/hub/store/{{.ITEM}}/generated/db/ && cd backend/internal/hub/store/{{.ITEM}} && sqlc generate

  generate-sqlc-worker:
    desc: Generate type-safe SQL code for Worker
    deps: [generate-proto]
    sources:
      - backend/generated/proto/**/*
      - backend/internal/worker/sqlc.yaml
      - backend/internal/worker/db/**/*.sql
    generates:
      - backend/internal/worker/generated/db/**/*
    cmds:
      - rm -rf backend/internal/worker/generated/db/
      - cd backend/internal/worker && sqlc generate

  generate-spinners:
    desc: Download spinner verb JSON files from awesome-claude-spinners
    vars:
      CACHE_DIR:
        sh: echo "${HOME:-$USERPROFILE}/.cache/awesome-claude-spinners"
    generates:
      - frontend/src/spinners/**/*
    status:
      - test -d frontend/src/spinners
    cmds:
      - |
        if [ ! -d "{{.CACHE_DIR}}" ]; then
          git clone --depth 1 https://github.com/AlexPl292/awesome-claude-spinners "{{.CACHE_DIR}}"
        fi
      - rm -rf frontend/src/spinners
      - mkdir -p frontend/src/spinners
      - cp -r "{{.CACHE_DIR}}/spinners/." frontend/src/spinners/

  # --- Preparation ---

  prepare:
    desc: Prepare all modules for builds
    cmds:
      - task: prepare-frontend
      - task: prepare-backend
      - task: prepare-desktop

  prepare-frontend:
    desc: Prepare frontend for builds
    sources:
      - proto/**/*
      - buf.gen.yaml
      - buf.yaml
      - NOTICE.html
      - icons/leapmux-icon.svg
      - icons/leapmux-icon-square.svg
      - frontend/package.json
      - frontend/bun.lock
      - frontend/scripts/**/*
      - scripts/build-ico.mjs
      - frontend/src/generated/**/*
    generates:
      - frontend/node_modules/**/*
      - frontend/public/NOTICE.html
      - frontend/public/leapmux-icon.ico
      - frontend/public/leapmux-icon.svg
      - frontend/public/icons/leapmux-icon-192.png
      - frontend/public/icons/leapmux-icon-512.png
      - frontend/public/icons/leapmux-icon-maskable-512.png
      - frontend/public/icons/leapmux-icon-square-apple-touch.png
    cmds:
      - task: generate-proto
      - task: generate-spinners
      - cd frontend && bun install
      - mkdir -p frontend/public/icons
      - NODE_PATH=frontend/node_modules bun frontend/scripts/generate-icons.mjs icons/leapmux-icon.svg icons/leapmux-icon-square.svg frontend/public
      - "[ -a NOTICE.html ] && cp NOTICE.html frontend/public/NOTICE.html || true"

  prepare-backend:
    desc: Prepare backend for builds
    sources:
      - proto/**/*
      - buf.gen.yaml
      - buf.yaml
      - backend/internal/hub/frontend.embed
      - frontend/.output/public/**/*
      - backend/generated/proto/**/*
      - backend/internal/hub/store/*/generated/db/**/*
      - backend/internal/worker/generated/db/**/*
    generates:
      - backend/internal/hub/generated/frontend/embed.go
      - backend/internal/hub/generated/frontend/public/**/*
    cmds:
      - task: generate-proto
      - task: generate-sqlc
      - task: build-frontend
      - rm -rf backend/internal/hub/generated/frontend/public
      - mkdir -p backend/internal/hub/generated/frontend/public
      - cp backend/internal/hub/frontend.embed backend/internal/hub/generated/frontend/embed.go
      - cp -r frontend/.output/public/. backend/internal/hub/generated/frontend/public/

  prepare-desktop:
    desc: Prepare desktop for builds
    preconditions:
      - sh: '[ "{{OS}}" = "darwin" ] || [ "{{OS}}" = "linux" ] || [ "{{OS}}" = "windows" ]'
        msg: "Unsupported OS: {{OS}}. Desktop builds require macOS, Linux, or Windows."
    sources:
      - proto/**/*
      - buf.gen.yaml
      - buf.yaml
      - icons/leapmux-icon-square.svg
      - icons/leapmux-icon.svg
      - desktop/rust/scripts/**/*
      - scripts/build-ico.mjs
      - frontend/.output/**/*
      - backend/internal/hub/generated/frontend/public/**/*
    generates:
      - desktop/rust/icons/icon@2x.png
      - desktop/rust/icons/icon.ico
    cmds:
      - task: generate-proto
      - task: build-frontend
      - task: prepare-backend
      - mkdir -p desktop/rust/icons
      - cmd: NODE_PATH=frontend/node_modules bun desktop/rust/scripts/generate-icons.mjs icons/leapmux-icon-square.svg icons/leapmux-icon.svg desktop/rust/icons/icon@2x.png desktop/rust/icons/icon.ico opaque
        if: '[ "{{OS}}" = "darwin" ]'
      - cmd: NODE_PATH=frontend/node_modules bun desktop/rust/scripts/generate-icons.mjs icons/leapmux-icon.svg icons/leapmux-icon.svg desktop/rust/icons/icon@2x.png desktop/rust/icons/icon.ico transparent
        if: '[ "{{OS}}" = "linux" ] || [ "{{OS}}" = "windows" ]'

  # --- Build ---

  build:
    desc: Build all modules
    cmds:
      - task: build-frontend
      - task: build-backend
      - task: build-desktop

  build-frontend:
    desc: Build frontend
    sources:
      - proto/**/*
      - buf.gen.yaml
      - buf.yaml
      - frontend/package.json
      - frontend/bun.lock
      - frontend/*config*
      - frontend/scripts/**/*
      - frontend/src/**/*
      - frontend/tests/**/*
      - frontend/patches/**/*
      - frontend/public/**/*
    generates:
      - frontend/.output/**/*
      - frontend/.vinxi/**/*
    cmds:
      - task: prepare-frontend
      - cd frontend && LEAPMUX_VERSION={{.VERSION}} LEAPMUX_COMMIT_HASH={{.COMMIT_HASH}} LEAPMUX_COMMIT_TIME={{.COMMIT_TIME}} LEAPMUX_BUILD_TIME={{.BUILD_TIME}} bun run build

  build-backend:
    desc: Build backend
    sources:
      - proto/**/*
      - buf.gen.yaml
      - buf.yaml
      - backend/go.mod
      - backend/go.sum
      - backend/**/*.go
      - backend/internal/hub/generated/frontend/public/**/*
    generates:
      - leapmux{{if eq OS "windows"}}.exe{{end}}
    cmds:
      - task: prepare-backend
      - cd backend && go build -ldflags "{{.VERSION_LDFLAGS}}" -o ../leapmux{{if eq OS "windows"}}.exe{{end}} ./cmd/leapmux

  build-backend-docker:
    desc: Build backend for Docker images
    sources:
      - backend/go.mod
      - backend/go.sum
      - backend/**/*.go
      - backend/internal/hub/generated/frontend/public/**/*
    generates:
      - leapmux
    cmds:
      - task: prepare-backend
      - |
        CGO_ENABLED=0
        GOOS={{.GOOS | default "linux"}} GOARCH={{.GOARCH | default "amd64"}}
        cd backend && go build -ldflags "-s -w {{.VERSION_LDFLAGS}}" -o ../leapmux ./cmd/leapmux

  build-desktop:
    desc: Build desktop
    preconditions:
      - sh: '[ "{{OS}}" = "darwin" ] || [ "{{OS}}" = "linux" ] || [ "{{OS}}" = "windows" ]'
        msg: "Unsupported OS: {{OS}}. Desktop builds require macOS, Linux, or Windows."
    cmds:
      - task: build-desktop-darwin
        if: '[ "{{OS}}" = "darwin" ]'
      - task: build-desktop-linux
        if: '[ "{{OS}}" = "linux" ]'
      - task: build-desktop-windows
        if: '[ "{{OS}}" = "windows" ]'

  build-desktop-darwin:
    desc: Build desktop for macOS
    sources:
      - backend/go.mod
      - backend/go.sum
      - backend/**/*.go
      - desktop/go/go.mod
      - desktop/go/go.sum
      - desktop/go/**/*.go
      - exclude: desktop/go/bin/**/*
      - desktop/rust/*.rs
      - desktop/rust/src/**/*
      - desktop/rust/Cargo.*
      - desktop/rust/capabilities/**/*
      - desktop/rust/tauri.conf.json
      - desktop/rust/icons/icon@2x.png
      - desktop/rust/scripts/**/*
      - frontend/.output/**/*
      - backend/internal/hub/generated/frontend/public/**/*
    generates:
      - "LeapMux Desktop.app/**/*"
      - "LeapMuxDesktop_{{.VERSION}}_{{ARCH}}.dmg"
    cmds:
      - task: prepare-desktop
      - task: build-desktop-sidecar
      - cd desktop/rust && ../../frontend/node_modules/.bin/tauri build --bundles app --config '{"version":"{{.VERSION}}"}'
      # Move sidecar from Resources/_up_/go/bin/ to MacOS/ for a cleaner bundle layout.
      - mv "desktop/rust/target/release/bundle/macos/LeapMux Desktop.app/Contents/Resources/_up_/go/bin/"* "desktop/rust/target/release/bundle/macos/LeapMux Desktop.app/Contents/MacOS/"
      - rm -rf "desktop/rust/target/release/bundle/macos/LeapMux Desktop.app/Contents/Resources/_up_"
      - |
        APP_PATH="desktop/rust/target/release/bundle/macos/LeapMux Desktop.app"
        if [ -n "${MACOS_CODESIGN_IDENTITY:-}" ]; then
          echo "Signing macOS app with identity: ${MACOS_CODESIGN_IDENTITY}"
          codesign --force --deep --sign "${MACOS_CODESIGN_IDENTITY}" --timestamp --options runtime "${APP_PATH}"
        else
          echo "MACOS_CODESIGN_IDENTITY is not set; using ad hoc signing for the macOS app" >&2
          codesign --force --deep --sign - "${APP_PATH}"
        fi
        codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
      - rsync -a --delete "desktop/rust/target/release/bundle/macos/LeapMux Desktop.app/" "LeapMux Desktop.app/"
      - cd frontend/node_modules/macos-alias && npx --yes node-gyp rebuild 2>/dev/null || true
      - mkdir -p desktop/rust/target/release/bundle/dmg
      - >-
        desktop/rust/scripts/create-dmg.sh
        "{{.VERSION}}"
        "desktop/rust/target/release/bundle/macos/LeapMux Desktop.app"
        "desktop/rust/target/release/bundle/dmg/LeapMuxDesktop_{{.VERSION}}_{{ARCH}}.dmg"
      - cp -f "desktop/rust/target/release/bundle/dmg/LeapMuxDesktop_{{.VERSION}}_{{ARCH}}.dmg" "LeapMuxDesktop_{{.VERSION}}_{{ARCH}}.dmg"

  build-desktop-linux:
    desc: Build desktop for Linux
    sources:
      - backend/go.mod
      - backend/go.sum
      - backend/**/*.go
      - desktop/go/go.mod
      - desktop/go/go.sum
      - desktop/go/**/*.go
      - exclude: desktop/go/bin/**/*
      - desktop/rust/*.rs
      - desktop/rust/src/**/*
      - desktop/rust/Cargo.*
      - desktop/rust/capabilities/**/*
      - desktop/rust/tauri.conf.json
      - desktop/rust/tauri.linux.conf.json
      - desktop/rust/desktop-template.desktop
      - desktop/rust/icons/icon@2x.png
      - desktop/rust/scripts/**/*
      - frontend/.output/**/*
      - backend/internal/hub/generated/frontend/public/**/*
    generates:
      - leapmux-desktop
      - leapmux-desktop-service-*
      - leapmux-desktop*.deb
      - leapmux-desktop*.AppImage
    cmds:
      - task: prepare-desktop
      - task: build-desktop-sidecar
      - desktop/rust/scripts/patch-linuxdeploy.sh
      - cd desktop/rust && ../../frontend/node_modules/.bin/tauri build --config '{"version":"{{.VERSION}}"}'
      - cp -f desktop/rust/target/release/leapmux-desktop .
      - cp -f desktop/go/bin/leapmux-desktop-service-* .
      - cp -f desktop/rust/target/release/bundle/deb/leapmux-desktop*.deb .
      - cp -f desktop/rust/target/release/bundle/appimage/leapmux-desktop*.AppImage .

  build-desktop-windows:
    desc: Build desktop for Windows
    sources:
      - backend/go.mod
      - backend/go.sum
      - backend/**/*.go
      - desktop/go/go.mod
      - desktop/go/go.sum
      - desktop/go/**/*.go
      - exclude: desktop/go/bin/**/*
      - desktop/rust/*.rs
      - desktop/rust/src/**/*
      - desktop/rust/Cargo.*
      - desktop/rust/capabilities/**/*
      - desktop/rust/tauri.conf.json
      - desktop/rust/tauri.windows.conf.json
      - desktop/rust/icons/icon.ico
      - desktop/rust/scripts/**/*
      - frontend/.output/**/*
      - backend/internal/hub/generated/frontend/public/**/*
    generates:
      - LeapMuxDesktop*.exe
      - LeapMuxDesktop*.msi
      - leapmux-desktop-service-*.exe
    cmds:
      - task: prepare-desktop
      - task: build-desktop-sidecar
      - cd desktop/rust && ../../frontend/node_modules/.bin/tauri build --config '{"version":"{{.VERSION | replace "-dev" ""}}"}'
      - cp -f desktop/rust/target/release/LeapMuxDesktop.exe .
      - cp -f desktop/go/bin/leapmux-desktop-service-*.exe .
      # Tauri's NSIS and WiX bundlers name the installer after productName
      # ("LeapMux Desktop" — with a space), regardless of our mainBinaryName
      # override. Copy with a space-stripping rename so we ship spaceless
      # filenames. The WiX bundler additionally appends "_en-US"; strip
      # that too. We cd into the bundle dir first so the glob expands to
      # bare filenames: on Windows, mvdan/sh expands globs with directory
      # segments to native backslash paths, and the resulting behavior of
      # `${##*/}` varies with the parent shell (bash vs PowerShell).
      - |
        repo_root="$(pwd)"
        cd desktop/rust/target/release/bundle/nsis
        for src in LeapMux*-setup.exe; do
          [ -e "$src" ] || continue
          cp -f "$src" "$repo_root/${src// /}"
        done
      - |
        repo_root="$(pwd)"
        cd desktop/rust/target/release/bundle/msi
        for src in LeapMux*_en-US.msi; do
          [ -e "$src" ] || continue
          dest="${src// /}"
          dest="${dest/_en-US/}"
          cp -f "$src" "$repo_root/$dest"
        done

  # --- Testing ---

  test:
    desc: Run all tests
    cmds:
      - task: test-frontend
      - task: test-backend
      - task: test-desktop

  test-frontend:
    desc: Run frontend tests
    cmds:
      - task: prepare-frontend
      - task: lint-frontend
      - cd frontend && bun run test {{.CLI_ARGS}}

  test-backend:
    desc: Run backend tests
    cmds:
      - task: prepare-backend
      - task: lint-backend
      - cd backend && go test -tags integration {{.CLI_ARGS | default "./..."}}

  test-desktop:
    desc: Run desktop tests
    cmds:
      - task: prepare-desktop
      - task: lint-desktop
      - cd desktop/go && go test -tags integration {{.CLI_ARGS | default "./..."}}
      - cd desktop/rust && cargo test

  test-e2e:
    desc: Run end-to-end tests
    cmds:
      - task: prepare-frontend
      - task: lint-frontend
      - cd frontend && bun run test:e2e {{.CLI_ARGS}}

  # --- Linting ---

  lint:
    desc: Run all linters
    cmds:
      - task: lint-proto
      - task: lint-frontend
      - task: lint-backend
      - task: lint-desktop

  lint-proto:
    desc: Lint Protocol Buffer definitions
    sources:
      - proto/**/*.proto
      - buf.yaml
    cmds:
      - buf lint

  lint-frontend:
    desc: Lint frontend code
    deps: [prepare-frontend]
    sources:
      - frontend/package.json
      - frontend/bun.lock
      - frontend/*config*
      - frontend/scripts/**/*
      - frontend/src/**/*
      - frontend/tests/**/*
      - frontend/patches/**/*
      - frontend/public/**/*
    cmds:
      - cd frontend && bun run typecheck
      - cd frontend && bun run lint .

  lint-backend:
    desc: Lint Go code
    deps: [prepare-backend]
    sources:
      - .golangci.yml
      - backend/go.mod
      - backend/go.sum
      - backend/**/*.go
    cmds:
      - cd backend && golangci-lint run ./...

  lint-desktop:
    desc: Lint desktop sidecar and Tauri shell code
    sources:
      - .golangci.yml
      - desktop/go.mod
      - desktop/go.sum
      - desktop/**/*.go
      - exclude: desktop/go/bin/**/*
      - desktop/rust/Cargo.toml
      - desktop/rust/Cargo.lock
      - desktop/rust/*.rs
      - desktop/rust/src/**/*.rs
      - exclude: desktop/rust/target/**/*
    cmds:
      - task: prepare-desktop
      - task: build-desktop-sidecar
      - cd desktop/go && golangci-lint run ./...
      - cd desktop/rust && cargo clippy --all-targets -- -D warnings

  lint-fix:
    desc: Auto-fix lint violations
    cmds:
      - task: lint-fix-frontend
      - task: lint-fix-backend
      - task: lint-fix-desktop

  lint-fix-frontend:
    desc: Auto-fix frontend lint violations
    cmds:
      - task: prepare-frontend
      - cd frontend && bun run lint . --fix

  lint-fix-backend:
    desc: Auto-fix backend lint violations
    cmds:
      - task: prepare-backend
      - cd backend && golangci-lint run --fix ./...

  lint-fix-desktop:
    desc: Auto-fix desktop lint violations
    cmds:
      - task: prepare-desktop
      - cd desktop/go && golangci-lint run --fix ./...
      - cd desktop/rust && cargo clippy --fix --all-targets

  # --- Development ---

  dev:
    desc: Start all services for development
    cmds:
      - task: generate
      - task: build-backend
      - mprocs

  dev-solo:
    desc: Start solo mode for development
    cmds:
      - task: generate
      - task: build-backend
      - mprocs --config mprocs-solo.yaml

  dev-desktop:
    desc: Start desktop app for development
    cmds:
      - task: generate
      - task: prepare-frontend
      - task: prepare-desktop
      - task: build-desktop-sidecar
      - mprocs --config mprocs-desktop.yaml

  build-desktop-sidecar:
    desc: Build desktop sidecar binary
    sources:
      - backend/go.mod
      - backend/go.sum
      - backend/**/*.go
      - desktop/go/go.mod
      - desktop/go/go.sum
      - desktop/go/**/*.go
      - exclude: desktop/go/bin/**/*
    generates:
      - desktop/go/bin/leapmux-desktop-service-*
    cmds:
      - mkdir -p desktop/go/bin
      - |
        TARGET="{{if eq OS "darwin"}}{{if eq ARCH "arm64"}}aarch64{{else}}x86_64{{end}}-apple-darwin{{else if eq OS "linux"}}{{if eq ARCH "arm64"}}aarch64{{else}}x86_64{{end}}-unknown-linux-gnu{{else}}x86_64-pc-windows-msvc{{end}}"
        BIN="./bin/leapmux-desktop-service-${TARGET}{{if eq OS "windows"}}.exe{{end}}"
        # -H=windowsgui links the sidecar for the Windows GUI subsystem so
        # spawning it from the Tauri shell doesn't pop up a console window.
        # -buildmode=pie on Linux produces a shared-object-style ELF whose
        # layout patchelf (run by linuxdeploy against every ELF in the
        # AppDir) can rewrite without corruption. Non-PIE Go binaries get
        # subtly mangled on aarch64 — the .note.go.buildid section gets
        # dropped and ldd then exits 1 silently, which linuxdeploy treats
        # as a hard failure ("Failed to run ldd: exited with code 1").
        cd desktop/go && go build {{if eq OS "linux"}}-buildmode=pie {{end}}-ldflags "{{.VERSION_LDFLAGS}}{{if eq OS "windows"}} -H=windowsgui{{end}}" -o "${BIN}" .

  # --- Docker ---

  docker-build:
    desc: Build all Docker images
    cmds:
      - task: docker-build-alpine
      - task: docker-build-ubuntu

  docker-build-alpine:
    desc: Build Alpine Docker image
    vars:
      PLATFORM: '{{.PLATFORM | default "linux/amd64,linux/arm64"}}'
      TAG: '{{.TAG | default "leapmux:latest"}}'
    cmds:
      - >-
        docker buildx build
        --platform {{.PLATFORM}}
        --build-arg BASE_IMAGE={{.ALPINE_IMAGE}}
        --build-arg BUF_VERSION={{.BUF_VERSION}}
        --build-arg TASK_VERSION={{.TASK_VERSION}}
        --build-arg S6_OVERLAY_VERSION={{.S6_OVERLAY_VERSION}}
        --build-arg BUN_VERSION={{.BUN_VERSION}}
        --build-arg NODE_VERSION={{.NODE_VERSION}}
        --build-arg GOLANG_VERSION={{.GOLANG_VERSION}}
        --build-arg VERSION={{.VERSION}}
        --build-arg COMMIT_HASH={{.COMMIT_HASH}}
        --build-arg COMMIT_TIME={{.COMMIT_TIME}}
        -f docker/Dockerfile
        -t {{.TAG}}
        .

  docker-build-ubuntu:
    desc: Build Ubuntu Docker image
    vars:
      PLATFORM: '{{.PLATFORM | default "linux/amd64,linux/arm64"}}'
      TAG: '{{.TAG | default "leapmux:ubuntu"}}'
    cmds:
      - >-
        docker buildx build
        --platform {{.PLATFORM}}
        --build-arg BASE_IMAGE={{.UBUNTU_IMAGE}}
        --build-arg BUF_VERSION={{.BUF_VERSION}}
        --build-arg TASK_VERSION={{.TASK_VERSION}}
        --build-arg S6_OVERLAY_VERSION={{.S6_OVERLAY_VERSION}}
        --build-arg BUN_VERSION={{.BUN_VERSION}}
        --build-arg NODE_VERSION={{.NODE_VERSION}}
        --build-arg GOLANG_VERSION={{.GOLANG_VERSION}}
        --build-arg VERSION={{.VERSION}}
        --build-arg COMMIT_HASH={{.COMMIT_HASH}}
        --build-arg COMMIT_TIME={{.COMMIT_TIME}}
        -f docker/Dockerfile
        -t {{.TAG}}
        .

  # --- Notice ---

  generate-notice:
    desc: Generate third-party license notice
    deps: [prepare-frontend]
    sources:
      - scripts/generate-notice.mjs
      - scripts/license-overrides/**/*
      - backend/go.mod
      - backend/go.sum
      - desktop/go/go.mod
      - desktop/go/go.sum
      - desktop/rust/Cargo.toml
      - desktop/rust/Cargo.lock
      - frontend/package.json
      - frontend/bun.lock
    generates:
      - NOTICE.md
      - NOTICE.html
    cmds:
      - bun scripts/generate-notice.mjs

  # --- Clean ---

  clean:
    desc: Remove all build artifacts
    cmds:
      - task: clean-desktop
      - task: clean-backend
      - task: clean-frontend
      - rm -f *.log */*.log
      - rm -rf .task/

  clean-frontend:
    desc: Remove frontend build artifacts
    cmds:
      - rm -rf frontend/.output/
      - rm -rf frontend/.vinxi/
      - rm -f  frontend/public/NOTICE.html
      - rm -rf frontend/public/icons/
