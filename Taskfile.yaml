version: '3'

run: once

vars:
  VERSION:
    sh: yq '.version' versions.yaml
  COMMIT_HASH:
    sh: git rev-parse --short HEAD 2>/dev/null || echo ""
  BUILD_TIME:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  VERSION_LDFLAGS: >-
    -X github.com/leapmux/leapmux/util/version.Value={{.VERSION}}
    -X github.com/leapmux/leapmux/util/version.CommitHash={{.COMMIT_HASH}}
    -X github.com/leapmux/leapmux/util/version.BuildTime={{.BUILD_TIME}}
  ALPINE_IMAGE:
    sh: yq '.alpine-image' versions.yaml
  UBUNTU_IMAGE:
    sh: yq '.ubuntu-image' versions.yaml
  BUF_VERSION:
    sh: yq '.buf-version' versions.yaml
  SQLC_VERSION:
    sh: yq '.sqlc-version' versions.yaml
  S6_OVERLAY_VERSION:
    sh: yq '.s6-overlay-version' versions.yaml
  TASK_VERSION:
    sh: yq '.task-version' versions.yaml

# --- Code Generation ---

tasks:
  generate:
    desc: Generate all code (proto + sqlc)
    deps: [generate-proto, generate-sqlc]

  generate-proto:
    desc: Generate Protocol Buffer code (Go + TypeScript)
    sources:
      - proto/**/*
      - buf.gen.yaml
      - buf.yaml
    generates:
      - backend/generated/proto/**/*
      - frontend/src/generated/**/*
    cmds:
      - rm -rf backend/generated/proto/ frontend/src/generated/
      - buf generate

  generate-sqlc:
    desc: Generate all type-safe SQL code
    deps: [generate-sqlc-hub, generate-sqlc-worker]

  generate-sqlc-hub:
    desc: Generate type-safe SQL code for Hub
    deps: [generate-proto]
    sources:
      - backend/generated/proto/**/*
      - backend/internal/hub/db/**/*.sql
      - backend/internal/hub/sqlc.yaml
    generates:
      - backend/internal/hub/generated/db/**/*
    cmds:
      - cd backend/internal/hub && sqlc generate

  generate-sqlc-worker:
    desc: Generate type-safe SQL code for Worker
    deps: [generate-proto]
    sources:
      - backend/generated/proto/**/*
      - backend/internal/worker/db/**/*.sql
      - backend/internal/worker/sqlc.yaml
    generates:
      - backend/internal/worker/generated/db/**/*
    cmds:
      - cd backend/internal/worker && sqlc generate

  # --- Preparation ---

  prepare:
    desc: Prepare all dependencies
    deps: [prepare-backend, prepare-frontend]

  prepare-backend:
    desc: Prepare backend (generate proto + sqlc)
    deps: [generate]

  generate-spinners:
    desc: Download spinner verb JSON files from awesome-claude-spinners
    vars:
      CACHE_DIR: '{{.HOME}}/.cache/awesome-claude-spinners'
    generates:
      - frontend/src/spinners/**/*
    status:
      - test -d frontend/src/spinners
    cmds:
      - |
        if [ ! -d "{{.CACHE_DIR}}" ] || [ -n "$(find "{{.CACHE_DIR}}" -maxdepth 0 -mtime +30 2>/dev/null)" ]; then
          rm -rf "{{.CACHE_DIR}}"
          git clone --depth 1 https://github.com/AlexPl292/awesome-claude-spinners "{{.CACHE_DIR}}"
        fi
      - mkdir -p frontend/src/spinners
      - rsync -a --delete "{{.CACHE_DIR}}/spinners/" frontend/src/spinners/

  prepare-frontend:
    desc: Install frontend dependencies
    deps: [generate-proto, generate-spinners]
    sources:
      - frontend/package.json
      - frontend/bun.lock
    generates:
      - frontend/node_modules/**/*
    cmds:
      - cd frontend && bun install

  # --- Build ---

  build:
    desc: Build all (backend + frontend + desktop)
    cmds:
      - task: generate
      - task: build-backend
      - |
        if command -v wails >/dev/null 2>&1; then
          task build-desktop
        else
          echo "⚠ Skipping desktop build: 'wails' is not installed."
          echo "  Install it with your package manager (e.g. brew install wails) to build the desktop app."
        fi

  embed-frontend:
    desc: Embed frontend assets for go:embed
    deps: [build-frontend]
    sources:
      - backend/internal/hub/frontend.embed
      - frontend/.output/public/**/*
    generates:
      - backend/internal/hub/generated/frontend/embed.go
      - backend/internal/hub/generated/frontend/public/**/*
    cmds:
      - mkdir -p backend/internal/hub/generated/frontend/public
      - rsync -a backend/internal/hub/frontend.embed backend/internal/hub/generated/frontend/embed.go
      - rsync -a --delete frontend/.output/public/ backend/internal/hub/generated/frontend/public/

  build-backend:
    desc: Build leapmux binary
    deps: [prepare-backend, embed-frontend]
    dir: backend
    sources:
      - backend/go.mod
      - backend/go.sum
      - backend/cmd/**/*
      - backend/generated/**/*
      - backend/hub/**/*
      - backend/internal/**/*
      - backend/worker/**/*
      - "backend/**/*.go"
    generates:
      - backend/build/bin/leapmux
    cmds:
      - mkdir -p build/bin
      - go build -ldflags "{{.VERSION_LDFLAGS}}" -o ./build/bin/leapmux ./cmd/leapmux

  build-backend-docker:
    desc: Build leapmux binary for Docker (static, cross-compiled)
    deps: [prepare-backend, embed-frontend]
    dir: backend
    cmds:
      - mkdir -p build/bin
      - >-
        CGO_ENABLED=0 GOOS={{.GOOS | default "linux"}} GOARCH={{.GOARCH | default "amd64"}}
        go build -ldflags "-s -w {{.VERSION_LDFLAGS}}"
        -o ./build/bin/leapmux ./cmd/leapmux

  generate-web-icons:
    desc: Generate web favicon and PNG icons from SVG sources
    deps: [prepare-frontend]
    sources:
      - icons/leapmux-icon-corners.svg
      - icons/leapmux-icon.svg
    generates:
      - frontend/public/leapmux-icon-corners.ico
      - frontend/public/leapmux-icon-corners.svg
      - frontend/public/icons/leapmux-icon-corners-192.png
      - frontend/public/icons/leapmux-icon-corners-512.png
      - frontend/public/icons/leapmux-icon-corners-maskable-512.png
      - frontend/public/icons/leapmux-icon-apple-touch.png
    cmds:
      - NODE_PATH=frontend/node_modules bun frontend/scripts/generate-icons.mjs icons/leapmux-icon-corners.svg icons/leapmux-icon.svg frontend/public

  build-frontend:
    desc: Build frontend assets
    deps: [prepare-frontend, generate-web-icons]
    sources:
      - frontend/package.json
      - frontend/bun.lock
      - frontend/src/**/*
      - frontend/public/**/*
      - frontend/app.config.ts
      - frontend/tsconfig.json
    generates:
      - frontend/.output/**/*
      - frontend/.vinxi/**/*
    cmds:
      - cd frontend && LEAPMUX_VERSION={{.VERSION}} LEAPMUX_COMMIT_HASH={{.COMMIT_HASH}} LEAPMUX_BUILD_TIME={{.BUILD_TIME}} bun run build

  # --- Testing ---

  test:
    desc: Run all tests
    cmds:
      - task: generate
      - task: _test

  _test:
    internal: true
    deps: [test-backend, test-frontend]

  test-backend:
    desc: Run Go tests (unit + integration)
    deps: [lint-backend]
    dir: backend
    cmds:
      - go test -tags integration {{.CLI_ARGS | default "./..."}}

  test-frontend:
    desc: Run frontend unit tests
    deps: [lint-frontend]
    cmds:
      - cd frontend && bun run test {{.CLI_ARGS}}


  test-e2e:
    desc: Run end-to-end tests
    deps: [lint-frontend]
    cmds:
      - cd frontend && bun run test:e2e {{.CLI_ARGS}}

  # --- Linting ---

  lint:
    desc: Run all linters
    cmds:
      - task: generate
      - task: _lint

  _lint:
    internal: true
    deps: [lint-proto, lint-backend, lint-frontend]
    cmds:
      - |
        if command -v wails >/dev/null 2>&1; then
          task lint-desktop
        else
          echo "⚠ Skipping desktop lint: 'wails' is not installed."
        fi

  lint-proto:
    desc: Lint Protocol Buffer definitions
    sources:
      - proto/**/*.proto
      - buf.yaml
    cmds:
      - buf lint

  lint-backend:
    desc: Lint Go code
    deps: [prepare-backend, embed-frontend]
    dir: backend
    sources:
      - backend/go.mod
      - backend/go.sum
      - "backend/**/*.go"
      - "backend/**/migrations/*.sql"
      - backend/.golangci.yml
    cmds:
      - golangci-lint run ./...

  lint-frontend:
    desc: Lint frontend code
    deps: [prepare-frontend]
    sources:
      - frontend/package.json
      - frontend/bun.lock
      - frontend/src/**/*
      - frontend/tests/**/*
      - frontend/public/**/*
      - frontend/app.config.ts
      - frontend/tsconfig.json
      - frontend/vitest.config.ts
      - frontend/eslint.config.ts
    cmds:
      - cd frontend && bun run lint .
      - cd frontend && bun run typecheck

  lint-fix:
    desc: Auto-fix lint violations (Go + frontend)
    cmds:
      - task: generate
      - task: _lint-fix

  _lint-fix:
    internal: true
    deps: [lint-fix-backend, lint-fix-frontend]
    cmds:
      - |
        if command -v wails >/dev/null 2>&1; then
          task lint-fix-desktop
        else
          echo "⚠ Skipping desktop lint-fix: 'wails' is not installed."
        fi

  lint-fix-backend:
    desc: Auto-fix Go lint violations
    deps: [prepare-backend, embed-frontend]
    dir: backend
    cmds:
      - golangci-lint run --fix ./...

  lint-fix-frontend:
    desc: Auto-fix frontend lint violations
    deps: [prepare-frontend]
    cmds:
      - cd frontend && bun run lint . --fix

  # --- Development ---

  dev:
    desc: Start all services for development
    cmds:
      - task: generate
      - task: build-backend
      - mprocs

  dev-solo:
    desc: Start solo mode for development
    cmds:
      - task: generate
      - task: build-backend
      - mprocs --config mprocs-solo.yaml

  # --- Docker ---

  docker-build:
    desc: Build all Docker images
    deps: [docker-build-alpine, docker-build-ubuntu]

  docker-build-alpine:
    desc: Build Alpine Docker image
    vars:
      PLATFORM: '{{.PLATFORM | default "linux/amd64,linux/arm64"}}'
      TAG: '{{.TAG | default "leapmux:latest"}}'
    cmds:
      - >-
        docker buildx build
        --platform {{.PLATFORM}}
        --build-arg BASE_IMAGE={{.ALPINE_IMAGE}}
        --build-arg BUF_VERSION={{.BUF_VERSION}}
        --build-arg SQLC_VERSION={{.SQLC_VERSION}}
        --build-arg TASK_VERSION={{.TASK_VERSION}}
        --build-arg S6_OVERLAY_VERSION={{.S6_OVERLAY_VERSION}}
        --build-arg VERSION={{.VERSION}}
        -f docker/Dockerfile
        -t {{.TAG}}
        .

  docker-build-ubuntu:
    desc: Build Ubuntu Docker image
    vars:
      PLATFORM: '{{.PLATFORM | default "linux/amd64,linux/arm64"}}'
      TAG: '{{.TAG | default "leapmux:ubuntu"}}'
    cmds:
      - >-
        docker buildx build
        --platform {{.PLATFORM}}
        --build-arg BASE_IMAGE={{.UBUNTU_IMAGE}}
        --build-arg BUF_VERSION={{.BUF_VERSION}}
        --build-arg SQLC_VERSION={{.SQLC_VERSION}}
        --build-arg TASK_VERSION={{.TASK_VERSION}}
        --build-arg S6_OVERLAY_VERSION={{.S6_OVERLAY_VERSION}}
        --build-arg VERSION={{.VERSION}}
        -f docker/Dockerfile
        -t {{.TAG}}
        .

  # --- Desktop ---

  generate-desktop-icons-non-darwin:
    desc: Generate desktop icons for Linux and Windows
    deps: [prepare-frontend]
    sources:
      - icons/leapmux-icon-corners.svg
    generates:
      - desktop/build/appicon.png
      - desktop/build/windows/icon.ico
    cmds:
      - mkdir -p desktop/build/windows
      - NODE_PATH=frontend/node_modules bun desktop/scripts/generate-icons.mjs icons/leapmux-icon-corners.svg icons/leapmux-icon-corners.svg desktop/build/appicon.png desktop/build/windows/icon.ico transparent

  generate-desktop-icons-darwin:
    desc: Generate Apple-safe desktop icons for macOS
    deps: [prepare-frontend]
    sources:
      - icons/leapmux-icon.svg
      - icons/leapmux-icon-corners.svg
    generates:
      - desktop/build/appicon.png
      - desktop/build/windows/icon.ico
    cmds:
      - mkdir -p desktop/build/windows
      - NODE_PATH=frontend/node_modules bun desktop/scripts/generate-icons.mjs icons/leapmux-icon.svg icons/leapmux-icon-corners.svg desktop/build/appicon.png desktop/build/windows/icon.ico opaque

  prepare-desktop-non-darwin:
    desc: Prepare desktop build dependencies for Linux and Windows
    cmds:
      - task: generate
      - task: embed-frontend
      - rsync -a desktop/platform/ desktop/build/
      - task: generate-desktop-icons-non-darwin

  prepare-desktop-darwin:
    desc: Prepare desktop build dependencies for macOS
    cmds:
      - task: generate
      - task: embed-frontend
      - rsync -a desktop/platform/ desktop/build/
      - task: generate-desktop-icons-darwin

  build-desktop:
    desc: Build LeapMux desktop app for current platform
    sources:
      - desktop/go.mod
      - desktop/go.sum
      - "desktop/**/*.go"
      - desktop/frontend/**/*
      - desktop/build/appicon.png
      - desktop/build/windows/icon.ico
      - backend/go.mod
      - backend/go.sum
      - "backend/**/*.go"
    cmds:
      - task: build-desktop-{{if eq OS "darwin"}}darwin{{else if eq OS "windows"}}windows{{else}}{{OS}}-{{ARCH}}{{end}}

  build-desktop-darwin:
    desc: Build LeapMux desktop app for macOS
    dir: desktop
    deps: [prepare-desktop-darwin]
    sources:
      - desktop/go.mod
      - desktop/go.sum
      - "desktop/**/*.go"
      - desktop/frontend/**/*
      - desktop/build/appicon.png
      - backend/go.mod
      - backend/go.sum
      - "backend/**/*.go"
    generates:
      - desktop/build/bin/LeapMux.app/Contents/MacOS/LeapMux
    cmds:
      - wails build -tags devtools -platform darwin/universal -ldflags "{{.VERSION_LDFLAGS}}"
      - codesign --force --sign - --identifier dev.leapmux.desktop --options runtime build/bin/LeapMux.app
      - task: package-desktop-dmg

  package-desktop-dmg:
    desc: Package LeapMux.app into a .dmg (macOS only)
    platforms: [darwin]
    deps: [prepare-frontend]
    sources:
      - desktop/build/bin/LeapMux.app/Contents/MacOS/LeapMux
      - desktop/scripts/create-dmg.sh
    generates:
      - desktop/build/bin/LeapMux-{{.VERSION}}.dmg
    cmds:
      - cd frontend && npm rebuild macos-alias 2>/dev/null || true
      - >-
        desktop/scripts/create-dmg.sh
        "{{.VERSION}}"
        desktop/build/bin/LeapMux.app
        desktop/build/bin/LeapMux-{{.VERSION}}.dmg

  build-desktop-linux-amd64:
    desc: Build LeapMux desktop app for Linux (amd64)
    dir: desktop
    deps: [prepare-desktop-non-darwin]
    sources:
      - desktop/go.mod
      - desktop/go.sum
      - "desktop/**/*.go"
      - desktop/frontend/**/*
      - desktop/build/appicon.png
      - desktop/build/windows/icon.ico
      - backend/go.mod
      - backend/go.sum
      - "backend/**/*.go"
    generates:
      - desktop/build/bin/leapmux-desktop
    cmds:
      - wails build -tags devtools -o leapmux-desktop -platform linux/amd64 -ldflags "{{.VERSION_LDFLAGS}}"
      - cp build/linux/leapmux-desktop.desktop build/bin/
      - cp build/appicon.png build/bin/leapmux-desktop.png
      - cp ../icons/leapmux-icon-corners.svg build/bin/leapmux-desktop.svg

  build-desktop-linux-arm64:
    desc: Build LeapMux desktop app for Linux (arm64)
    dir: desktop
    deps: [prepare-desktop-non-darwin]
    sources:
      - desktop/go.mod
      - desktop/go.sum
      - "desktop/**/*.go"
      - desktop/frontend/**/*
      - desktop/build/appicon.png
      - desktop/build/windows/icon.ico
      - backend/go.mod
      - backend/go.sum
      - "backend/**/*.go"
    generates:
      - desktop/build/bin/leapmux-desktop
    cmds:
      - wails build -tags devtools -o leapmux-desktop -platform linux/arm64 -ldflags "{{.VERSION_LDFLAGS}}"
      - cp build/linux/leapmux-desktop.desktop build/bin/
      - cp build/appicon.png build/bin/leapmux-desktop.png
      - cp ../icons/leapmux-icon-corners.svg build/bin/leapmux-desktop.svg

  build-desktop-windows:
    desc: Build LeapMux desktop app for Windows
    dir: desktop
    deps: [prepare-desktop-non-darwin]
    sources:
      - desktop/go.mod
      - desktop/go.sum
      - "desktop/**/*.go"
      - desktop/frontend/**/*
      - desktop/build/appicon.png
      - desktop/build/windows/icon.ico
      - backend/go.mod
      - backend/go.sum
      - "backend/**/*.go"
    generates:
      - desktop/build/bin/LeapMux.exe
    cmds:
      - wails build -tags devtools -platform windows/amd64 -ldflags "{{.VERSION_LDFLAGS}}"

  lint-desktop:
    desc: Lint desktop Go code
    deps: [prepare-desktop-non-darwin]
    dir: desktop
    sources:
      - desktop/go.mod
      - desktop/go.sum
      - "desktop/**/*.go"
      - backend/go.mod
      - backend/go.sum
      - "backend/**/*.go"
      - "backend/**/migrations/*.sql"
      - backend/.golangci.yml
    cmds:
      - golangci-lint run ./...

  lint-fix-desktop:
    desc: Auto-fix desktop Go lint violations
    deps: [prepare-desktop-non-darwin]
    dir: desktop
    cmds:
      - golangci-lint run --fix ./...

  # --- Clean ---

  clean:
    desc: Remove all build artifacts and generated code
    cmds:
      - rm -rf backend/build/ backend/leapmux
      - rm -rf backend/generated/ backend/*/generated/ backend/*/*/generated/
      - rm -rf frontend/.output/ frontend/.vinxi/ frontend/node_modules/
      - rm -rf frontend/src/spinners/
      - rm -rf desktop/build/ desktop/leapmux-desktop
      - rm -rf .task/

