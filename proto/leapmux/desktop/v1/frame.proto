syntax = "proto3";
package leapmux.desktop.v1;

// --- Top-level wire message ---

message Frame {
  oneof message {
    Request request = 1;
    Response response = 2;
    Event event = 3;
  }
}

// --- Requests (Rust → Go) ---

message Request {
  uint64 id = 1;
  oneof method {
    GetConfigRequest get_config = 10;
    SetWindowSizeRequest set_window_size = 11;
    GetBuildInfoRequest get_build_info = 12;
    CheckFullDiskAccessRequest check_full_disk_access = 13;
    GetSidecarInfoRequest get_sidecar_info = 28;
    GetStartupInfoRequest get_startup_info = 27;
    OpenFullDiskAccessSettingsRequest open_full_disk_access_settings = 14;
    ConnectSoloRequest connect_solo = 15;
    ConnectDistributedRequest connect_distributed = 16;
    ProxyHttpRequest proxy_http = 17;
    OpenChannelRelayRequest open_channel_relay = 18;
    SendChannelMessageRequest send_channel_message = 19;
    CloseChannelRelayRequest close_channel_relay = 20;
    SwitchModeRequest switch_mode = 21;
    // Fields 22–23 reserved (removed get_hub_url, is_connected).
    CreateTunnelRequest create_tunnel = 24;
    DeleteTunnelRequest delete_tunnel = 25;
    ListTunnelsRequest list_tunnels = 26;
    ShutdownRequest shutdown = 29;
    ListEditorsRequest list_editors = 30;
    OpenInEditorRequest open_in_editor = 31;
    // OrgEvents relay: the webview cannot directly dial the
    // unix-socket hub for /ws/orgevents, so the sidecar opens the WS
    // on its behalf and proxies inbound frames as Tauri events.
    // Mirrors the OpenChannelRelay / CloseChannelRelay pattern but
    // is read-only — the frontend never writes to /ws/orgevents.
    OpenOrgEventsRelayRequest open_org_events_relay = 32;
    CloseOrgEventsRelayRequest close_org_events_relay = 33;
    CliPathStatusRequest cli_path_status = 34;
    CliInstallSymlinkRequest cli_install_symlink = 35;
  }
}

// Parameterless requests
message GetConfigRequest {}
message GetBuildInfoRequest {}
message GetStartupInfoRequest {}
message CheckFullDiskAccessRequest {}
message GetSidecarInfoRequest {}
message OpenFullDiskAccessSettingsRequest {}
message ConnectSoloRequest {}
message OpenChannelRelayRequest {}
message CloseChannelRelayRequest {}
message CloseOrgEventsRelayRequest {}
message SwitchModeRequest {}
message ListTunnelsRequest {}
message ShutdownRequest {}
message CliPathStatusRequest {}

// CliInstallSymlinkRequest creates the on-PATH symlink for the bundled
// `leapmux` CLI. `force` controls overwriting an existing entry at the
// symlink destination: when false (default), a regular (non-symlink) file
// at the destination causes RESULT_ALREADY_EXISTS_REAL_FILE so the UI can
// confirm with the user before clobbering it. When true, any existing file
// or symlink is removed before the new symlink is created. Either way, a
// dangling/outdated symlink is silently replaced — the prompt only guards
// against clobbering a real file the user explicitly put there.
message CliInstallSymlinkRequest {
  bool force = 1;
}

// OpenOrgEventsRelay names the org subscription the sidecar should
// establish. `workspace_ids` is empty for the standard "all my
// workspaces" subscription; non-empty narrows the filter exactly
// like the URL-query equivalent on the direct WebSocket path.
message OpenOrgEventsRelayRequest {
  string org_id = 1;
  repeated string workspace_ids = 2;
}

message ListEditorsRequest {
  // When true, bypass the cached detection result and re-probe the
  // filesystem. Used by the "Refresh editor list" UI action.
  bool refresh = 1;
}

// Parameterized requests
message SetWindowSizeRequest {
  int32 width = 1;
  int32 height = 2;
  WindowMode mode = 3;
}

message ConnectDistributedRequest {
  string hub_url = 1;
}

message ProxyHttpRequest {
  string method = 1;
  string path = 2;
  map<string, string> headers = 3;
  bytes body = 4;
}

message SendChannelMessageRequest {
  bytes data = 1;
}

message CreateTunnelRequest {
  TunnelConfig config = 1;
}

message DeleteTunnelRequest {
  string tunnel_id = 1;
}

message OpenInEditorRequest {
  string editor_id = 1;
  string path = 2;
}

// --- Responses (Go → Rust) ---

message Response {
  uint64 id = 1;
  string error = 2;
  oneof result {
    DesktopConfig config = 10;
    SetWindowSizeResponse set_window_size = 11;
    BuildInfo build_info = 12;
    BoolValue bool_value = 13;
    ProxyHttpResponse proxy_http = 15;
    StringValue string_value = 16;
    CreateTunnelResponse create_tunnel = 17;
    ListTunnelsResponse list_tunnels = 18;
    StartupInfo startup_info = 19;
    SidecarInfo sidecar_info = 20;
    ListEditorsResponse list_editors = 21;
    CliPathStatusResponse cli_path_status = 22;
    CliInstallSymlinkResponse cli_install_symlink = 23;
  }
}

// --- CLI PATH integration (macOS) ---
//
// CliPathStatusResponse classifies whether the `leapmux` CLI shipped inside
// the desktop app bundle is discoverable on the user's PATH. Used by the
// frontend to offer a one-click symlink install at /usr/local/bin/leapmux.
// On non-darwin builds the sidecar always returns STATE_UNAVAILABLE.
message CliPathStatusResponse {
  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_OK = 1;          // leapmux on PATH and (realpath or sha256) matches the bundled binary
    STATE_MISSING = 2;     // leapmux not on PATH; symlink target reported in `target`
    STATE_MISMATCH = 3;    // leapmux on PATH but is a different binary (different content); path reported in `resolved`
    STATE_UNAVAILABLE = 4; // not applicable (non-macOS, or bundled binary absent — dev runs)
  }
  // TargetKind describes what (if anything) currently exists at the
  // install destination (`target` below). The UI uses this to decide
  // upfront whether the Install button needs a "replaces existing file"
  // warning and whether to send `force=true` — without it, MISSING +
  // non-exec real file at the destination requires a two-click flow
  // (Install → ALREADY_EXISTS_REAL_FILE → Replace).
  enum TargetKind {
    TARGET_KIND_UNSPECIFIED = 0;  // permission error or unclassifiable; clients should treat as REGULAR_FILE (safer prompt)
    TARGET_KIND_ABSENT = 1;       // nothing at target path
    TARGET_KIND_SYMLINK = 2;      // any symlink (valid, dangling, points elsewhere)
    TARGET_KIND_REGULAR_FILE = 3; // user-placed file (non-symlink)
  }
  State state = 1;
  string bundled = 2;    // absolute path to the bundled leapmux inside the .app
  string resolved = 3;   // absolute on-PATH path; only set when state = STATE_MISMATCH
  string target = 4;     // suggested install destination; only set when state = STATE_MISSING
  TargetKind target_kind = 5; // populated for every state; describes what's at `target` (or cliSymlinkDst when target is empty)
}

// CliInstallSymlinkResponse reports the outcome of attempting to create the
// symlink at /usr/local/bin/leapmux. NEEDS_SUDO surfaces the exact sudo
// command for the UI to display; PARENT_MISSING fires when /usr/local/bin
// itself is absent (clean Apple Silicon without Homebrew).
message CliInstallSymlinkResponse {
  enum Result {
    RESULT_UNSPECIFIED = 0;
    RESULT_OK = 1;
    RESULT_NEEDS_SUDO = 2;
    RESULT_ALREADY_EXISTS_REAL_FILE = 3;
    RESULT_PARENT_MISSING = 4;
    RESULT_IO_ERROR = 5;
  }
  Result result = 1;
  string command = 2; // populated for NEEDS_SUDO / PARENT_MISSING (suggested sudo command)
  string path = 3;    // populated for ALREADY_EXISTS_REAL_FILE / PARENT_MISSING
  string message = 4; // populated for IO_ERROR
}

message SetWindowSizeResponse {}
message BoolValue { bool value = 1; }
message StringValue { string value = 1; }

message ProxyHttpResponse {
  int32 status = 1;
  map<string, string> headers = 2;
  bytes body = 3;
}

message CreateTunnelResponse {
  TunnelInfo info = 1;
}

message ListTunnelsResponse {
  repeated TunnelInfo tunnels = 1;
}

message ListEditorsResponse {
  repeated DetectedEditor editors = 1;
}

message DetectedEditor {
  string id = 1;
  string display_name = 2;
}

message StartupInfo {
  DesktopConfig config = 1;
  BuildInfo build_info = 2;
}

enum SidecarShellMode {
  SIDECAR_SHELL_MODE_UNSPECIFIED = 0;
  SIDECAR_SHELL_MODE_LAUNCHER = 1;
  SIDECAR_SHELL_MODE_SOLO = 2;
  SIDECAR_SHELL_MODE_DISTRIBUTED = 3;
}

message SidecarInfo {
  string protocol_version = 1;
  string binary_hash = 2;
  int64 pid = 3;
  SidecarShellMode shell_mode = 4;
  bool connected = 5;
  string hub_url = 6;
}

// --- Events (Go → Rust) ---

message Event {
  oneof payload {
    ChannelMessageEvent channel_message = 1;
    ChannelCloseEvent channel_close = 2;
    SidecarLogEvent sidecar_log = 3;
    // OrgEventsMessage carries an already-framed WatchOrgEvent proto
    // payload (the same length-prefixed bytes the direct WebSocket
    // path would deliver). The frontend's useOrgEvents hook treats
    // these identically to native WebSocket message frames.
    OrgEventsMessageEvent org_events_message = 4;
    // OrgEventsClose signals the sidecar's relay to the hub has
    // terminated; the frontend resets its bootstrap state in the
    // same way it does on a native WebSocket `close` event.
    OrgEventsCloseEvent org_events_close = 5;
  }
}

message ChannelMessageEvent {
  bytes data = 1;
}

message ChannelCloseEvent {}

message OrgEventsMessageEvent {
  bytes data = 1;
}

message OrgEventsCloseEvent {}

message SidecarLogEvent {
  string level = 1;
  string time = 2;
  string message = 3;
  repeated string attrs = 4;
}

// --- Shared types ---

// WindowMode is the top-level display state of the desktop window. The three
// states are mutually exclusive: a window is windowed, macOS-zoomed, or in
// native fullscreen -- never a combination. window_width/height on
// DesktopConfig always hold the last *windowed* geometry so exiting
// maximized/fullscreen returns to a sensible size.
enum WindowMode {
  WINDOW_MODE_UNSPECIFIED = 0; // treated as NORMAL (fresh config default)
  WINDOW_MODE_NORMAL = 1;
  WINDOW_MODE_MAXIMIZED = 2;
  WINDOW_MODE_FULLSCREEN = 3;
}

message DesktopConfig {
  string mode = 1;
  string hub_url = 2;
  int32 window_width = 3;
  int32 window_height = 4;
  WindowMode window_mode = 5;
}

message BuildInfo {
  string version = 1;
  string commit_hash = 2;
  string commit_time = 3;
  string build_time = 4;
  string branch = 5; // Optional git ref (branch or tag) injected at build time; empty for detached HEAD
}

message TunnelConfig {
  string worker_id = 1;
  string type = 2;
  string target_addr = 3;
  int32 target_port = 4;
  string bind_addr = 5;
  int32 bind_port = 6;
  string hub_url = 7;
  string user_id = 8;
}

message TunnelInfo {
  string id = 1;
  string worker_id = 2;
  string type = 3;
  string bind_addr = 4;
  int32 bind_port = 5;
  string target_addr = 6;
  int32 target_port = 7;
}
