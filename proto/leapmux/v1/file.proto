syntax = "proto3";
package leapmux.v1;

message ListDirectoryRequest {
  string org_id = 1;
  string worker_id = 2;
  string path = 3;
  int32 max_depth = 4; // When > 0, merge single-child directories server-side up to this depth
  bool dirs_only = 5; // When true, exclude non-directory entries before applying the entry limit
}

message ListDirectoryResponse {
  string path = 1;
  repeated FileInfo entries = 2;
  bool truncated = 3;
}

message ReadFileRequest {
  string org_id = 1;
  string worker_id = 2;
  string path = 3;
  int64 offset = 4;
  int64 limit = 5; // Max bytes; 0 = default (64KB)
  // When true and the file size exceeds the read window
  // (offset + effective limit), the server returns an empty content
  // payload with the file's total_size populated, skipping the actual
  // bytes. Lets the file viewer detect oversize files (e.g. images we
  // refuse to preview) in a single round trip — combining what would
  // otherwise be a StatFile + ReadFile pair.
  bool meta_only_if_truncated = 6;
}

message ReadFileResponse {
  string path = 1;
  bytes content = 2;
  int64 total_size = 3;
}

message StatFileRequest {
  string org_id = 1;
  string worker_id = 2;
  string path = 3;
}

message StatFileResponse {
  FileInfo info = 1;
}

message FileInfo {
  string name = 1;
  string path = 2;
  bool is_dir = 3;
  int64 size = 4;
  string mod_time = 5;
  string permissions = 6;
  bool hidden = 7;
}
