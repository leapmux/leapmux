syntax = "proto3";
package leapmux.v1;

// ShareMode controls backend/workspace visibility.
enum ShareMode {
  SHARE_MODE_UNSPECIFIED = 0;
  SHARE_MODE_PRIVATE = 1;
  SHARE_MODE_ORG = 2;
  SHARE_MODE_MEMBERS = 3;
}

// PageRequest specifies pagination parameters.
message PageRequest {
  int32 limit = 1;
  string cursor = 2;
}

// PageResponse contains pagination metadata.
message PageResponse {
  string next_cursor = 1;
  bool has_more = 2;
}

// WorktreeAction conveys the user's pre-close choice so the backend
// can skip its own dirty-check and honor the decision atomically.
enum WorktreeAction {
  WORKTREE_ACTION_UNSPECIFIED = 0;  // No prior user choice — backend decides
  WORKTREE_ACTION_KEEP = 1;         // User chose Keep
  WORKTREE_ACTION_REMOVE = 2;       // User chose Remove
}

// WorktreeRemovalOutcome reports what a WORKTREE_ACTION_REMOVE close did
// with the tab's worktree, so the caller can toast the actual outcome
// instead of optimistically promising a removal that may not have
// happened (e.g. sibling tabs in another branch group still reference
// the worktree). UNSPECIFIED covers every non-removal close: KEEP, a tab
// with no worktree association, or a REMOVE that degraded to KEEP.
enum WorktreeRemovalOutcome {
  WORKTREE_REMOVAL_OUTCOME_UNSPECIFIED = 0;       // No removal attempted (KEEP / no worktree / degraded)
  WORKTREE_REMOVAL_OUTCOME_REMOVED = 1;           // This close was the last reference; worktree removed
  WORKTREE_REMOVAL_OUTCOME_STILL_REFERENCED = 2;  // Dropped this tab's link; other tabs still reference it
  WORKTREE_REMOVAL_OUTCOME_FAILED = 3;            // Last reference, but removal failed (failure_* populated)
}

// CloseTabResult carries the outcome shared by CloseAgentResponse and
// CloseTerminalResponse.
//
// Partial failures (DB close failed, worktree directory couldn't be
// removed) are returned as success-plus-failure-fields rather than as
// an RPC error. This is intentional: the close RPCs are fire-and-forget
// dispatches issued *after* the frontend has already committed the UI
// tab removal synchronously, so there is nothing to "roll back" if the
// backend hits a hiccup. Structured failure fields let the UI surface a
// warn toast (with the worktree path, if relevant) while still honoring
// the already-visible close. An RPC error would collapse the structured
// info into a single string and imply the close didn't happen, neither
// of which matches the async-close contract.
message CloseTabResult {
  string worktree_path = 1;   // Populated on worktree-remove failure so the user can clean up manually
  string worktree_id = 2;     // Populated on worktree-remove failure alongside worktree_path
  string failure_message = 3; // Short human title of a partial failure (empty = success)
  string failure_detail = 4;  // Longer context (path, stderr, stack) for the failure
  // What a REMOVE close did with the worktree. Lets the caller toast the
  // real outcome (removed / still referenced elsewhere / failed) rather
  // than optimistically assuming removal.
  WorktreeRemovalOutcome worktree_removal = 5;
}

// --- Per-file git status ---

// GitFileStatusCode describes the status of a file in the index or working tree.
enum GitFileStatusCode {
  GIT_FILE_STATUS_CODE_UNSPECIFIED = 0;
  GIT_FILE_STATUS_CODE_MODIFIED = 1;
  GIT_FILE_STATUS_CODE_ADDED = 2;
  GIT_FILE_STATUS_CODE_DELETED = 3;
  GIT_FILE_STATUS_CODE_RENAMED = 4;
  GIT_FILE_STATUS_CODE_COPIED = 5;
  GIT_FILE_STATUS_CODE_TYPE_CHANGED = 6;
  GIT_FILE_STATUS_CODE_UNTRACKED = 7;
  GIT_FILE_STATUS_CODE_UNMERGED = 8;
}

message GitFileStatusEntry {
  string path = 1;                              // Path relative to repo root
  GitFileStatusCode staged_status = 2;          // Status in the index (staged)
  GitFileStatusCode unstaged_status = 3;        // Status in the working tree (unstaged)
  int32 lines_added = 4;                        // Unstaged lines added
  int32 lines_deleted = 5;                      // Unstaged lines deleted
  int32 staged_lines_added = 6;                 // Staged lines added
  int32 staged_lines_deleted = 7;               // Staged lines deleted
  string old_path = 8;                          // Previous path (for renames/copies)
}
