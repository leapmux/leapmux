syntax = "proto3";
package leapmux.v1;

// AuthService handles user authentication.
// Called by Frontend on Hub via ConnectRPC.
service AuthService {
  // Authenticate with username and password.
  rpc Login(LoginRequest) returns (LoginResponse);
  // Invalidate the current session.
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  // Get the currently authenticated user.
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);
  // Register a new account.
  rpc SignUp(SignUpRequest) returns (SignUpResponse);
  // Verify email with a verification token.
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  // Get public system information (no auth required).
  rpc GetSystemInfo(GetSystemInfoRequest) returns (GetSystemInfoResponse);
  // List enabled OAuth providers (no auth required).
  rpc GetOAuthProviders(GetOAuthProvidersRequest) returns (GetOAuthProvidersResponse);
  // Get pre-filled data for a pending OAuth signup (no auth required).
  rpc GetPendingOAuthSignup(GetPendingOAuthSignupRequest) returns (GetPendingOAuthSignupResponse);
  // Complete OAuth signup by choosing a username (no auth required).
  rpc CompleteOAuthSignup(CompleteOAuthSignupRequest) returns (CompleteOAuthSignupResponse);
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  reserved 1; // was: token (now delivered via Set-Cookie)
  User user = 2;
}

message LogoutRequest {}

message LogoutResponse {}

message GetCurrentUserRequest {}

message GetCurrentUserResponse {
  User user = 1;
}

message SignUpRequest {
  string username = 1;
  string password = 2;
  string display_name = 3;
  string email = 4;
}

message SignUpResponse {
  reserved 1; // was: token (now delivered via Set-Cookie)
  User user = 2;
  bool verification_required = 3;
}

message VerifyEmailRequest {
  string verification_token = 1;
}

message VerifyEmailResponse {
  reserved 1; // was: token (now delivered via Set-Cookie)
  User user = 2;
}

message User {
  string id = 1;
  string org_id = 2;
  string username = 3;
  string display_name = 4;
  bool is_admin = 5;
  string email = 6;
  bool email_verified = 7;
  string org_name = 8;
  string pending_email = 9;
  repeated LinkedOAuthProvider oauth_providers = 10;
  bool password_set = 11;
}

message LinkedOAuthProvider {
  string id = 1;
  string name = 2;
}

message GetSystemInfoRequest {}

message GetSystemInfoResponse {
  bool signup_enabled = 1;
  bool solo_mode = 2;
  string version = 3;
  string commit_hash = 4;
  string commit_time = 5;
  string build_time = 6;
  bool oauth_enabled = 7; // true if at least one OAuth provider is configured and enabled
  bool setup_required = 8; // true when no users exist (first-time setup needed)
  string branch = 9; // Optional git ref (branch or tag) injected at build time; empty for detached HEAD
}

message GetOAuthProvidersRequest {}

message GetOAuthProvidersResponse {
  repeated OAuthProviderInfo providers = 1;
}

message OAuthProviderInfo {
  string id = 1;
  string name = 2;
  string provider_type = 3; // "oidc" or "github"
  string login_url = 4;     // full URL to /auth/oauth/{id}/login
}

message GetPendingOAuthSignupRequest {
  string signup_token = 1;
}

message GetPendingOAuthSignupResponse {
  string email = 1;
  string display_name = 2;
  string provider_name = 3;
}

message CompleteOAuthSignupRequest {
  string signup_token = 1;
  string username = 2;
  string display_name = 3;
  string email = 4;
}

message CompleteOAuthSignupResponse {
  User user = 1;
}
