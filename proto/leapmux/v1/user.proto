syntax = "proto3";
package leapmux.v1;

import "leapmux/v1/auth.proto";

// UserService manages user profile and preferences.
// Called by Frontend on Hub via ConnectRPC.
service UserService {
  // Update the current user's profile (username and display name only).
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  // Request an email address change. May require verification.
  rpc RequestEmailChange(RequestEmailChangeRequest) returns (RequestEmailChangeResponse);
  // Verify a pending email change with a verification token.
  rpc VerifyEmailChange(VerifyEmailChangeRequest) returns (VerifyEmailChangeResponse);
  // Change the current user's password. When password_set is false (OAuth-only
  // users), current_password may be empty.
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  // Unlink an OAuth provider from the current user's account.
  rpc UnlinkOAuthProvider(UnlinkOAuthProviderRequest) returns (UnlinkOAuthProviderResponse);
  // Get the current user's preferences.
  rpc GetPreferences(GetPreferencesRequest) returns (GetPreferencesResponse);
  // Update the current user's preferences.
  rpc UpdatePreferences(UpdatePreferencesRequest) returns (UpdatePreferencesResponse);
  // Get the current timeout configuration.
  rpc GetTimeouts(GetTimeoutsRequest) returns (GetTimeoutsResponse);
}

message UpdateProfileRequest {
  string username = 1;
  string display_name = 2;
  reserved 3; // was: email (use RequestEmailChange instead)
}

message UpdateProfileResponse {
  string username = 1;
  string display_name = 2;
  string email = 3;
  string org_name = 4; // Updated personal org name (if username changed)
  string pending_email = 5;
}

message RequestEmailChangeRequest {
  string new_email = 1;
}

message RequestEmailChangeResponse {
  bool verification_required = 1;
}

message VerifyEmailChangeRequest {
  string verification_token = 1;
}

message VerifyEmailChangeResponse {
  User user = 1;
}

message ChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {}

message UnlinkOAuthProviderRequest {
  string provider_id = 1;
}

message UnlinkOAuthProviderResponse {}

message GetPreferencesRequest {}

message GetPreferencesResponse {
  UserPreferences preferences = 1;
}

enum DiffView {
  DIFF_VIEW_UNSPECIFIED = 0;
  DIFF_VIEW_UNIFIED = 1;
  DIFF_VIEW_SPLIT = 2;
}

enum TurnEndSound {
  TURN_END_SOUND_UNSPECIFIED = 0;
  TURN_END_SOUND_NONE = 1;
  TURN_END_SOUND_DING_DONG = 2;
}

message UpdatePreferencesRequest {
  repeated string ui_fonts = 1;
  repeated string mono_fonts = 2;
  string theme = 3;
  string terminal_theme = 4;
  bool ui_font_custom_enabled = 5;
  bool mono_font_custom_enabled = 6;
  DiffView diff_view = 7;
  TurnEndSound turn_end_sound = 8;
  optional uint32 turn_end_sound_volume = 9;
  bool debug_logging = 10;
  // JSON-encoded array of custom keybinding overrides.
  // Each element: {"key": "<tinykeys-combo>", "command": "<command-id>", "when": "<optional-expr>"}
  // Empty string means "no change"; explicit "[]" clears all overrides.
  optional string custom_keybindings_json = 11;
}

message UpdatePreferencesResponse {
  UserPreferences preferences = 1;
}

message GetTimeoutsRequest {}

message GetTimeoutsResponse {
  int32 api_timeout_seconds = 1;
  int32 agent_startup_timeout_seconds = 2;
  int32 worktree_create_timeout_seconds = 3;
}

message UserPreferences {
  repeated string ui_fonts = 1;
  repeated string mono_fonts = 2;
  string theme = 3;
  string terminal_theme = 4;
  bool ui_font_custom_enabled = 5;
  bool mono_font_custom_enabled = 6;
  DiffView diff_view = 7;
  TurnEndSound turn_end_sound = 8;
  optional uint32 turn_end_sound_volume = 9;
  bool debug_logging = 10;
  // JSON-encoded array of custom keybinding overrides.
  string custom_keybindings_json = 11;
}
