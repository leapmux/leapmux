syntax = "proto3";
package leapmux.v1;

import "leapmux/v1/common.proto";

// AgentProvider identifies the coding agent backend.
enum AgentProvider {
  AGENT_PROVIDER_UNSPECIFIED = 0;
  AGENT_PROVIDER_CLAUDE_CODE = 1;
  AGENT_PROVIDER_CODEX = 2;
  reserved 3; // removed provider
  AGENT_PROVIDER_CURSOR = 4;
  AGENT_PROVIDER_GITHUB_COPILOT = 5;
  AGENT_PROVIDER_KILO = 6;
  AGENT_PROVIDER_OPENCODE = 7;
  AGENT_PROVIDER_GOOSE = 8;
  AGENT_PROVIDER_PI = 9;
  AGENT_PROVIDER_REASONIX = 10;
}

// AgentStatus tracks the lifecycle state of an agent.
enum AgentStatus {
  AGENT_STATUS_UNSPECIFIED = 0;
  AGENT_STATUS_ACTIVE = 1;
  AGENT_STATUS_INACTIVE = 2;
  AGENT_STATUS_STARTING = 3;        // Subprocess launch in progress
  AGENT_STATUS_STARTUP_FAILED = 4;  // Subprocess launch failed; see startup_error
}

// MessageSource identifies which side of the transcript a chat row
// belongs to. This is a transcript-row classifier, not a strict
// provenance / "who produced the bytes" classifier.
enum MessageSource {
  MESSAGE_SOURCE_UNSPECIFIED = 0;

  // User-side transcript row. Includes:
  //   - Human-typed input.
  //   - Synthetic conversational prompts injected by LeapMux that are
  //     forwarded to the agent's stdin (auto-continue, plan-execution
  //     prompts).
  //   - Display-only synthetic rows that mirror a user-side action
  //     (control-response / approval feedback such as Claude permission
  //     decisions or Pi extension_ui_response display text; agent
  //     interrupt display rows that are persisted but not forwarded
  //     to stdin).
  //   - Provider transcripts that arrive with a `user` role on the
  //     wire but represent agent-internal echoes (e.g. Claude tool
  //     results returned to the agent under role:"user").
  MESSAGE_SOURCE_USER = 1;

  // Agent-side transcript row. Anything the agent process emits to
  // its output stream — assistant text, tool calls, thinking blocks,
  // system notifications (rate limits, compaction, status updates),
  // and turn-end dividers. The fine-grained per-provider semantics
  // (assistant vs. system notification vs. terminal envelope) are
  // recovered by classifying the inner JSON envelope, not by source.
  MESSAGE_SOURCE_AGENT = 2;

  // LeapMux-synthesized non-conversational platform notification.
  // These rows are produced by LeapMux itself (never by the agent or
  // the user) and never reach the agent's stdin. Examples:
  // settings_changed, plan_execution metadata, context_cleared
  // markers, interrupt-event metadata.
  MESSAGE_SOURCE_LEAPMUX = 3;
}

// ContentCompression identifies the compression algorithm used for message content.
enum ContentCompression {
  CONTENT_COMPRESSION_UNSPECIFIED = 0;
  CONTENT_COMPRESSION_NONE = 1;
  CONTENT_COMPRESSION_ZSTD = 2;
}

// --- Agent CRUD ---

message OpenAgentRequest {
  // Target: where the agent runs.
  string workspace_id = 1;
  string org_id = 2;            // Workspace's org (mirrors OpenTerminalRequest.org_id); used by the worker to inject LEAPMUX_REMOTE_ORG_ID into the spawned process
  string worker_id = 3;         // Target worker (required)
  string working_dir = 4;       // Working directory on the worker (required)

  // Agent configuration.
  AgentProvider agent_provider = 5; // Coding agent provider (default: CLAUDE_CODE)
  string title = 6;
  string agent_session_id = 7;  // If set, resume from this session ID
  // Initial option selections keyed by option-group id (e.g. "model", "effort",
  // "permissionMode", and provider-specific axes). Missing well-known ids are
  // filled with provider defaults server-side.
  map<string, string> options = 8;

  // Git worktree / branch selection (mutually exclusive modes).
  bool create_worktree = 9;         // If true, create a git worktree before starting
  string worktree_branch = 10;      // Branch name for the worktree
  string worktree_base_branch = 11; // Base branch for "Create new worktree" (default: current branch)
  string use_worktree_path = 12;    // "Use existing worktree" mode
  string checkout_branch = 13;      // "Switch to branch" mode
  string create_branch = 14;        // "Create new branch" mode -- branch name to create
  string create_branch_base = 15;   // Base branch for "Create new branch" (default: current branch)

  // Reserved: slots freed when the model/effort scalars, system_prompt, and the
  // extra_settings map collapsed into the generic `options` map. The numbers are NOT
  // reused -- a new field takes a fresh number (>= 16) -- and the names cannot return.
  reserved 16, 17, 18;
  reserved "model", "system_prompt", "effort", "extra_settings";
}

message OpenAgentResponse {
  AgentInfo agent = 1;
}

message CloseAgentRequest {
  string agent_id = 1;
  WorktreeAction worktree_action = 2;
}

// CloseAgentResponse reports the outcome of CloseAgent. See CloseTabResult
// for why partial failures are returned in-band rather than as RPC errors.
message CloseAgentResponse {
  CloseTabResult result = 1;
}

message ListAgentsRequest {
  repeated string tab_ids = 1;
}

message ListAgentsResponse {
  repeated AgentInfo agents = 1;
}

message RenameAgentRequest {
  string agent_id = 1;
  string title = 2;
}

message RenameAgentResponse {}

message AgentInfo {
  // Identity.
  string id = 1;
  string workspace_id = 2;
  string title = 3;

  // Worker / location.
  string worker_id = 4;         // Worker this agent runs on
  string worker_name = 5;       // Human-readable worker name
  string working_dir = 6;       // Working directory on the worker
  string home_dir = 7;          // Worker's home directory for tilde path display

  // Agent configuration.
  AgentProvider agent_provider = 8; // Coding agent provider
  // All agent configuration axes (model, effort, permission mode, and every
  // provider-specific option) reported by the agent process, each with its
  // current value, default, mutability, and display order.
  repeated AvailableOptionGroup option_groups = 9;

  // Lifecycle / status.
  AgentStatus status = 10;
  string agent_session_id = 11; // Non-empty if agent session can be resumed
  string created_at = 12;
  string closed_at = 13;
  string startup_error = 14;    // Populated when status=AGENT_STATUS_STARTUP_FAILED
  string startup_message = 15;  // Populated when status=AGENT_STATUS_STARTING (e.g. "Checking Git status...")

  // Git.
  AgentGitStatus git_status = 16; // Git status for the agent's working directory

  // Reserved: slots freed when the model/effort/permission_mode scalars, the
  // extra_settings map, and the available_models / available_option_groups lists collapsed
  // into the generic `option_groups` list. 16 (supports_model_effort) was reused for
  // git_status before this change; the rest are never reused, and the names cannot return.
  reserved 17, 18, 19, 20, 21, 22;
  reserved "model", "effort", "permission_mode", "extra_settings", "available_models", "available_option_groups", "supports_model_effort";
}

// AvailableOption describes a single selectable value within an option group
// (e.g. a model, a reasoning effort, or a permission-mode value).
message AvailableOption {
  string id = 1;             // Value stored/sent in requests (e.g. "opus", "high", "default")
  string name = 2;           // Human-readable label (e.g. "Opus 4.8", "High", "Default")
  string description = 3;    // Tooltip text shown on hover
  int64 context_window = 4;  // Context window size in tokens (0 = n/a); set only on "model" group options
  // sub_groups carries the option groups this value determines -- set only on
  // "model" group options, where each model carries its own model-dependent
  // groups: the reasoning "effort" tiers it supports, and Claude's "extended
  // thinking" group whose enabled label is "Adaptive" vs "On" per model. It lets
  // the frontend recompute those dependent groups the instant the model selection
  // changes, instead of waiting for the worker to re-emit them after a relaunch.
  repeated AvailableOptionGroup sub_groups = 5;
}

// AvailableOptionGroup is one axis of agent configuration. ALL agent options
// are represented uniformly by this message: model, effort, permission mode,
// primary agent, and every provider-specific axis (fast mode, sandbox policy,
// service tier, ...). Well-known ids ("model", "effort", "permissionMode",
// "primaryAgent") let callers fetch a specific axis; provider-specific axes use
// their own id.
message AvailableOptionGroup {
  string id = 1;                        // Well-known or provider-specific group id
  string label = 2;                     // Display label (e.g. "Model", "Permission Mode")
  repeated AvailableOption options = 3;  // The selectable values in this group
  string current_value = 4;             // Currently selected option id
  string default_value = 5;             // Provider default option id
  bool mutable = 6;                     // false => agent-controlled, render read-only
  int32 order = 7;                      // Ascending display order in the popover
}

// --- Agent Messaging ---

// Attachment represents a file attached to a user message.
message Attachment {
  string filename = 1;
  string mime_type = 2;
  bytes data = 3;  // Raw file bytes
}

message SendAgentMessageRequest {
  string agent_id = 1;
  string content = 2; // User message text
  repeated Attachment attachments = 3;
}

message SendAgentMessageResponse {}

message SendAgentRawMessageRequest {
  string agent_id = 1;
  string content = 2; // Raw provider input/control payload
}

message SendAgentRawMessageResponse {}

// AgentChatMessage represents a complete message in the conversation.
message AgentChatMessage {
  string id = 1;
  MessageSource source = 2;
  bytes content = 3; // JSON blob from Claude Code (may be compressed per content_compression)
  int64 seq = 4;
  string created_at = 5;
  string delivery_error = 6; // Non-empty if worker delivery failed
  ContentCompression content_compression = 7; // Compression algorithm used for content
  AgentProvider agent_provider = 8; // Provider that produced this message
  int32 depth = 9; // Nesting level: 0=main agent, 1=subagent, 2=nested subagent
  string parent_span_id = 10; // span_id of the parent Agent/SpawnAgent that spawned this scope (empty for main)
  string span_id = 11; // Links a tool invocation with its result (tool_use ↔ tool_result, item/started ↔ item/completed)
  string span_type = 12; // Tool name (e.g. "Grep", "Edit") or item type (e.g. "commandExecution") for span messages
  int32 span_color = 13; // Color index assigned to this span (−1 = no color)
  string span_lines = 14; // JSON array of active span lines at this message's position
}

message AgentStreamChunk {
  string message_id = 1;
  bytes delta = 2; // Verbatim NDJSON line (stream_event from Claude Code)
  AgentProvider agent_provider = 3; // Provider that produced this chunk
  string span_id = 4; // Optional target tool/item span for inline streaming
  string method = 5; // Original provider notification method for classifying the stream
}

// AgentStreamEnd signals that streaming for a message is complete.
message AgentStreamEnd {
  string message_id = 1;
  string span_id = 2; // Optional target tool/item span for inline streaming
}

// AgentStatusChange notifies of agent status transitions.
message AgentStatusChange {
  // Identity.
  string agent_id = 1;
  AgentProvider agent_provider = 2; // Provider for this agent

  // Lifecycle / status.
  AgentStatus status = 3;
  string agent_session_id = 4;  // Non-empty if agent session can be resumed
  bool worker_online = 5;       // Whether the worker hosting this agent is online
  string startup_error = 6;     // Populated when status=AGENT_STATUS_STARTUP_FAILED
  string startup_message = 7;   // Phase label shown in the startup panel while status=AGENT_STATUS_STARTING (e.g. "Checking Git status...")

  // Agent configuration: all axes reported by the agent (empty = don't update).
  repeated AvailableOptionGroup option_groups = 8;

  // Git.
  AgentGitStatus git_status = 9; // Git status for the agent's working directory

  // Reserved: slots freed when the model/effort/permission_mode scalars, the
  // extra_settings map, and the available_models / available_option_groups lists collapsed
  // into the generic `option_groups` list. The numbers are NOT reused -- a new field takes
  // a fresh number (>= 10) -- and the names cannot return.
  reserved 10, 11, 12, 13, 14, 15;
  reserved "model", "effort", "permission_mode", "extra_settings", "available_models", "available_option_groups", "supports_model_effort";
}

// AgentGitStatus holds git repository status for an agent's working directory.
message AgentGitStatus {
  string branch = 1;        // Current branch name
  int32 ahead = 2;          // Commits ahead of upstream
  int32 behind = 3;         // Commits behind upstream
  bool conflicted = 4;      // Has merge conflicts (unmerged paths)
  bool stashed = 5;         // Has stashed changes
  bool deleted = 6;         // Has staged deletions
  bool renamed = 7;         // Has staged renames
  bool modified = 8;        // Has modifications in working directory
  bool type_changed = 9;    // Has type changes in staging area
  bool added = 10;          // Has staged additions
  bool untracked = 11;      // Has untracked files
  string origin_url = 12;   // Remote origin URL
  string toplevel = 13;     // Working-tree root (`git rev-parse --show-toplevel`)
  bool is_worktree = 14;    // True if `toplevel` is a linked worktree, not the main repo root
}

// --- Message History ---

message ListAgentMessagesRequest {
  string agent_id = 1;
  int64 after_seq = 2;  // Forward cursor: return messages with seq > after_seq (ascending)
  int32 limit = 3;      // Max messages to return (Hub enforces max 50)
  int64 before_seq = 4; // Backward cursor: return messages with seq < before_seq (returned ascending)
}

message ListAgentMessagesResponse {
  repeated AgentChatMessage messages = 1;
  bool has_more = 2;
  // Authoritative provider-agnostic to-do list at the time the response is
  // served. Drives the sidebar without re-scanning message history; survives
  // page reloads and cross-client opens via the worker's agent_todos table.
  repeated TodoItem todos = 3;
}

// TodoItem is the provider-neutral to-do row used by the sidebar list and
// inline TaskCreate/TaskUpdate/TaskList/TaskGet cards. Sources include
// Claude TodoWrite/Task*, Codex turn/plan/updated, and ACP sessionUpdate=plan.
message TodoItem {
  string id = 1;          // Claude Task* taskId; empty for snapshot-only providers
  string content = 2;     // Imperative title (e.g. "Run tests")
  TodoStatus status = 3;
  string active_form = 4; // Present-continuous label shown while in_progress
  string description = 5; // Claude Task* description; empty elsewhere
}

enum TodoStatus {
  TODO_STATUS_UNSPECIFIED = 0;
  TODO_STATUS_PENDING = 1;
  TODO_STATUS_IN_PROGRESS = 2;
  TODO_STATUS_COMPLETED = 3;
  TODO_STATUS_DELETED = 4;
}

// AgentTodosChanged is broadcast whenever a message mutates an agent's
// to-do list (after persistence). Recipients should replace the agent's
// list with todos verbatim — this event is authoritative.
message AgentTodosChanged {
  string agent_id = 1;
  repeated TodoItem todos = 2;
}

// --- Control Request/Response ---

// AgentControlRequest is sent when Claude Code needs user approval (e.g. ExitPlanMode, AskUserQuestion).
message AgentControlRequest {
  string agent_id = 1;
  string request_id = 2;
  bytes payload = 3;  // Full JSON of the control_request (verbatim)
  AgentProvider agent_provider = 4; // Provider for this agent
}

// AgentControlCancelRequest is sent when Claude Code cancels a pending control request.
message AgentControlCancelRequest {
  string agent_id = 1;
  string request_id = 2;
}

// SendControlResponseRequest sends a control response back to the agent.
message SendControlResponseRequest {
  string agent_id = 1;
  bytes content = 2;  // Raw JSON control_response for Claude Code stdin
}

message SendControlResponseResponse {}

// AgentMessageError notifies watchers of a message delivery failure.
message AgentMessageError {
  string agent_id = 1;
  string message_id = 2;
  string error = 3; // Non-empty = error, empty = cleared
}

// AgentMessageDeleted notifies watchers that a message was deleted.
message AgentMessageDeleted {
  string agent_id = 1;
  string message_id = 2;
}

message DeleteAgentMessageRequest {
  string agent_id = 1;
  string message_id = 2;
}

message DeleteAgentMessageResponse {}

// AgentSettings holds option values to apply, keyed by option-group id
// (e.g. "model", "effort", "permissionMode", "sandbox_policy"). Sparse: only
// the included ids change; omitted ids are left untouched.
message AgentSettings {
  map<string, string> options = 1;
}

message UpdateAgentSettingsRequest {
  string agent_id = 1;
  AgentSettings settings = 2;
}

message UpdateAgentSettingsResponse {
  // The option values the agent settled on after applying the change -- e.g. the
  // concrete model an account-default sentinel resolved to, and the effort a model
  // switch reset to. The client reconciles its optimistic state against these rather
  // than a separately-broadcast catalog, removing a cross-channel ordering dependency.
  // ALWAYS populated: for an offline edit or a failed restart where no running agent
  // confirms anything, this echoes the requested values filled with provider defaults
  // (it is never empty). Reconcile only the model/effort axes against it -- a non-model
  // axis applied live (ACP set_config_option) may not echo its refreshed value here, so
  // the reply can lag the optimistic selection; that axis is corrected by the next
  // status push instead.
  map<string, string> confirmed_options = 1;
}

message ListAvailableProvidersRequest {}

message ListAvailableProvidersResponse {
  repeated AgentProvider providers = 1;
}

// InterruptAgent asks the worker to abort the agent's current turn. The
// worker dispatches the appropriate provider-specific signal (SIGINT,
// stream-control payload, etc.); callers (frontend or CLI) never need to
// synthesize provider JSON.
message InterruptAgentRequest {
  string agent_id = 1;
  // Optional reason for audit/logging; not surfaced to the agent.
  string reason = 2;
}

message InterruptAgentResponse {}
