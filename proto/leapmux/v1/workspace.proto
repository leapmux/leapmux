syntax = "proto3";
package leapmux.v1;

import "leapmux/v1/agent.proto";
import "leapmux/v1/common.proto";
import "leapmux/v1/terminal.proto";

// TabType identifies the kind of workspace tab.
enum TabType {
  TAB_TYPE_UNSPECIFIED = 0;
  TAB_TYPE_AGENT = 1;
  TAB_TYPE_TERMINAL = 2;
  TAB_TYPE_FILE = 3;
}

// WorkspaceService manages workspace metadata + read-only tab views.
// Layout / tab mutations live on OrgCRDT (see org_ops.proto). The
// WorkspaceCreated / WorkspaceRenamed / WorkspaceDeleted lifecycle
// events are broadcast on the `/ws/orgevents` WebSocket subscription
// (see backend/internal/hub/service/ws_orgevents.go).
service WorkspaceService {
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (CreateWorkspaceResponse);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  // ListAllAccessibleWorkspaces returns every workspace the caller can read
  // (owner OR explicit grant) across every org -- including workspaces owned by
  // an org the caller is not a member of (cross-org collaboration). Unlike the
  // org-scoped ListWorkspaces, it is not filtered by org; each returned
  // Workspace carries its own org_id so the caller can route follow-up reads to
  // the owning org.
  rpc ListAllAccessibleWorkspaces(ListAllAccessibleWorkspacesRequest) returns (ListAllAccessibleWorkspacesResponse);
  rpc GetWorkspace(GetWorkspaceRequest) returns (GetWorkspaceResponse);
  rpc RenameWorkspace(RenameWorkspaceRequest) returns (RenameWorkspaceResponse);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
  rpc UpdateWorkspaceSharing(UpdateWorkspaceSharingRequest) returns (UpdateWorkspaceSharingResponse);
  rpc ListWorkspaceShares(ListWorkspaceSharesRequest) returns (ListWorkspaceSharesResponse);
  // ListTabs returns the materialized tab list across one or more
  // workspaces. Reads `workspace_tab_rendered`.
  rpc ListTabs(ListTabsRequest) returns (ListTabsResponse);
  // GetTab returns a single tab so callers can resolve the worker
  // that owns it. Reads `workspace_tab_rendered`.
  rpc GetTab(GetTabRequest) returns (GetTabResponse);
  // LocateTab resolves a tab by (tab_type, tab_id) without requiring
  // workspace_id or org_id — the hub finds the tab across every
  // workspace the caller can access. Used by the `leapmux remote` CLI
  // to derive the spawning tab's context (workspace, org, tile,
  // worker) from a single env-injected anchor (LEAPMUX_REMOTE_TAB_ID
  // + LEAPMUX_REMOTE_TAB_TYPE). Reads `workspace_tab_rendered`.
  rpc LocateTab(LocateTabRequest) returns (LocateTabResponse);
  // LocateTile resolves a tile by tile_id without requiring
  // workspace_id. The hub walks the user's accessible CRDT state
  // (from the in-memory `crdt.Manager` for the user's org), finds
  // the workspace whose tile-tree contains the node, and verifies
  // the caller can read that workspace. Returns NotFound when the
  // tile isn't visible to the caller. Used by the `leapmux remote`
  // CLI universal resolver when a script knows only a tile id.
  rpc LocateTile(LocateTileRequest) returns (LocateTileResponse);
}

// --- Workspace CRUD ---

message CreateWorkspaceRequest {
  string org_id = 1;
  string title = 2;
}

message CreateWorkspaceResponse {
  string workspace_id = 1;
}

message ListWorkspacesRequest {
  string org_id = 1;
  PageRequest page = 2;
}

message ListWorkspacesResponse {
  repeated Workspace workspaces = 1;
  PageResponse page = 2;
}

message ListAllAccessibleWorkspacesRequest {}

message ListAllAccessibleWorkspacesResponse {
  repeated Workspace workspaces = 1;
}

message GetWorkspaceRequest {
  string org_id = 1;
  string workspace_id = 2;
}

message GetWorkspaceResponse {
  Workspace workspace = 1;
}

message Workspace {
  string id = 1;
  string org_id = 2;
  string created_by = 3;
  string title = 4;
  string created_at = 5;
  ShareMode share_mode = 6;
}

// --- Workspace Sharing ---

message UpdateWorkspaceSharingRequest {
  string workspace_id = 1;
  ShareMode share_mode = 2;
  repeated string user_ids = 3;
}

message UpdateWorkspaceSharingResponse {}

message ListWorkspaceSharesRequest {
  string workspace_id = 1;
}

message ListWorkspaceSharesResponse {
  ShareMode share_mode = 1;
  repeated WorkspaceShareMember members = 2;
}

message WorkspaceShareMember {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
}

// --- Workspace Rename & Delete ---

message RenameWorkspaceRequest {
  string workspace_id = 1;
  string title = 2;
}

message RenameWorkspaceResponse {}

message DeleteWorkspaceRequest {
  string workspace_id = 1;
}

message DeleteWorkspaceResponse {
  // Workers that hosted tabs at delete time. The frontend calls each
  // for cleanup. Sourced from OrgCrdtState.tabs (in-memory) so even
  // tabs hidden by projection-repair are included.
  repeated string worker_ids = 1;
}

// --- Workspace Tabs (read-only views; mutations via OrgCRDT) ---

message WorkspaceTab {
  TabType tab_type = 1;
  string tab_id = 2;
  string position = 3;
  string tile_id = 4;
  string worker_id = 5;
  string workspace_id = 6;
}

message ListTabsRequest {
  string org_id = 1;
  // Workspaces to fetch tabs for. Empty = every workspace in the org
  // the caller can read. Unknown / inaccessible IDs are silently
  // dropped so stale sidebar state doesn't produce errors.
  repeated string workspace_ids = 2;
}

message ListTabsResponse {
  repeated WorkspaceTab tabs = 1;
}

// --- Tiling Layout shared types ---

// SplitDirection names the orientation of the divider line between
// the two children of a SPLIT node. The convention matches tmux and
// the `tile split --direction` CLI flag:
//   HORIZONTAL = a horizontal divider (-) between two stacked panes.
//   VERTICAL   = a vertical divider (|) between two side-by-side panes.
enum SplitDirection {
  SPLIT_DIRECTION_UNSPECIFIED = 0;
  SPLIT_DIRECTION_HORIZONTAL = 1;
  SPLIT_DIRECTION_VERTICAL = 2;
}

// --- Worker Inner RPCs ---

message CleanupWorkspaceRequest {
  string workspace_id = 1;
}

message CleanupWorkspaceResponse {
  repeated WorktreeInfo worktrees = 1;
}

message WorktreeInfo {
  string worktree_id = 1;
  string worktree_path = 2;
  string branch_name = 3;
}

// --- Tab Workspace Move (Worker Inner RPC) ---

message MoveTabWorkspaceRequest {
  TabType tab_type = 1;
  string tab_id = 2;
  string new_workspace_id = 3;
}

message MoveTabWorkspaceResponse {}

// --- Event Streaming (per-agent / per-terminal) ---

message WatchEventsRequest {
  repeated WatchAgentEntry agents = 1;
  repeated WatchTerminalEntry terminals = 2;
}

message WatchAgentEntry {
  string agent_id = 1;
  // Which history to replay before the live stream begins. Defaults (UNSPECIFIED)
  // to LATEST -- the cold-start view.
  WatchReplayMode replay = 2;
  // Exclusive lower bound for AFTER_CURSOR replay (replay seq > cursor_seq);
  // ignored for LATEST.
  int64 cursor_seq = 3;
}

message WatchTerminalEntry {
  string terminal_id = 1;
  int64 after_offset = 2;
}

message WatchEventsResponse {
  oneof event {
    AgentEvent agent_event = 1;
    TerminalEvent terminal_event = 2;
  }
}

message AgentEvent {
  string agent_id = 1;
  oneof event {
    AgentChatMessage agent_message = 2;
    AgentStreamChunk stream_chunk = 3;
    AgentStreamEnd stream_end = 4;
    AgentStatusChange status_change = 5;
    AgentControlRequest control_request = 6;
    AgentControlCancelRequest control_cancel = 7;
    AgentMessageError message_error = 8;
    AgentMessageDeleted message_deleted = 9;
    CatchUpComplete catch_up_complete = 10;
    AgentTodosChanged todos_changed = 11;
    CatchUpStart catch_up_start = 12;
  }
}

// CatchUpStart is broadcast at the START of a WatchEvents (re)subscribe, BEFORE the
// message replay burst, carrying the agent's authoritative live-tail seq. A windowed
// client that was disconnected reconciles against it FIRST -- dropping any loaded row
// whose seq exceeds latest_seq (a tail deletion it missed while away) and clamping its
// recorded live-tail -- so phantom rows are gone before the replay renders rather than
// flashing until CatchUpComplete. CatchUpComplete repeats the reconcile as the final
// authority after the burst.
message CatchUpStart {
  // The agent's authoritative live-tail seq at the moment replay began. Explicit
  // presence: UNSET = the worker couldn't determine it (a DB error) and the client skips
  // reconciliation; present 0 = the agent genuinely has no messages; present >0 = the
  // authoritative MAX(seq).
  optional int64 latest_seq = 1;
}

message CatchUpComplete {
  // The agent's authoritative live-tail seq at the moment replay completed. A windowed
  // client that was disconnected never receives the AgentMessageDeleted for rows
  // deleted meanwhile, so it reconciles here: it drops any loaded row whose seq exceeds
  // latest_seq (a tail deletion it missed) and clamps its recorded live-tail to this
  // value, so its "new messages below" affordance can't stay stuck past a now-shorter
  // history. Explicit presence: UNSET = the worker couldn't determine it (a DB error) and
  // the client skips reconciliation; present 0 = the agent genuinely has no messages;
  // present >0 = the authoritative MAX(seq).
  optional int64 latest_seq = 1;
  // The live-tail seq at the moment replay BEGAN (== CatchUpStart.latest_seq), repeated
  // here so the reconcile can tell a deleted-during-replay phantom from a live arrival.
  // The worker registers the watcher BEFORE reading latest_seq, so a message created and
  // broadcast during catch-up can reach the client BEFORE this frame -- and its seq is
  // necessarily ABOVE start_tail_seq (it didn't exist when replay began), while a
  // deleted-during-replay phantom sits at-or-below it. So the client reaps only the
  // (latest_seq, start_tail_seq] band and EXEMPTS rows above start_tail_seq (genuine live
  // arrivals), instead of reaping everything above latest_seq (which would wrongly drop
  // them). Same explicit presence as latest_seq; UNSET disables the band exemption (the
  // client falls back to reaping above latest_seq, matching the pre-field behavior).
  optional int64 start_tail_seq = 2;
}

message TerminalEvent {
  string terminal_id = 1;
  oneof event {
    TerminalData data = 2;
    TerminalClosed closed = 3;
    TerminalStatusChange status_change = 4;
  }
}

// --- GetTab (single-tab worker resolution) ---

message GetTabRequest {
  string workspace_id = 1;
  string tab_id = 2;
  TabType tab_type = 3;
}

message GetTabResponse {
  WorkspaceTab tab = 1;
}

// --- LocateTab (cross-workspace single-tab lookup) ---
//
// Like GetTab but without a workspace_id filter: the hub looks for
// the tab across every workspace the caller can access (owner or
// share grant). Used when only the tab id is known — `leapmux remote`
// derives org / workspace / tile / worker from this single hop.
// Returns NotFound when no accessible workspace contains the tab.

message LocateTabRequest {
  TabType tab_type = 1;
  string  tab_id   = 2;
}

message LocateTabResponse {
  WorkspaceTab tab = 1;
}

// --- LocateTile (cross-workspace tile lookup) ---

message LocateTileRequest {
  string tile_id = 1;
}

message LocateTileResponse {
  string workspace_id = 1;
  string org_id       = 2;
}

// --- Workspace lifecycle events (broadcast on `/ws/orgevents`) ---

message WorkspaceRenamed {
  string workspace_id = 1;
  string title = 2;
}

message WorkspaceDeleted {
  string workspace_id = 1;
  repeated string worker_ids = 2;
}
