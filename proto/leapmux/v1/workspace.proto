syntax = "proto3";
package leapmux.v1;

import "leapmux/v1/agent.proto";
import "leapmux/v1/common.proto";
import "leapmux/v1/terminal.proto";

// TabType identifies the kind of workspace tab.
enum TabType {
  TAB_TYPE_UNSPECIFIED = 0;
  TAB_TYPE_AGENT = 1;
  TAB_TYPE_TERMINAL = 2;
  TAB_TYPE_FILE = 3; // Ephemeral file viewer tab (not persisted to backend)
}

// WorkspaceService is the hub-side service for workspace management.
// Frontend calls these RPCs directly on the Hub (not via E2EE channels).
service WorkspaceService {
  rpc CreateWorkspace(CreateWorkspaceRequest) returns (CreateWorkspaceResponse);
  rpc ListWorkspaces(ListWorkspacesRequest) returns (ListWorkspacesResponse);
  rpc GetWorkspace(GetWorkspaceRequest) returns (GetWorkspaceResponse);
  rpc RenameWorkspace(RenameWorkspaceRequest) returns (RenameWorkspaceResponse);
  rpc DeleteWorkspace(DeleteWorkspaceRequest) returns (DeleteWorkspaceResponse);
  rpc UpdateWorkspaceSharing(UpdateWorkspaceSharingRequest) returns (UpdateWorkspaceSharingResponse);
  rpc ListWorkspaceShares(ListWorkspaceSharesRequest) returns (ListWorkspaceSharesResponse);
  rpc AddTab(AddTabRequest) returns (AddTabResponse);
  rpc RemoveTab(RemoveTabRequest) returns (RemoveTabResponse);
  rpc ListTabs(ListTabsRequest) returns (ListTabsResponse);
  rpc GetLayout(GetLayoutRequest) returns (GetLayoutResponse);
  rpc SaveLayout(SaveLayoutRequest) returns (SaveLayoutResponse);
  rpc SaveMultiLayout(SaveMultiLayoutRequest) returns (SaveMultiLayoutResponse);
}

// --- Workspace CRUD ---

message CreateWorkspaceRequest {
  string org_id = 1;
  string title = 2;
}

message CreateWorkspaceResponse {
  string workspace_id = 1;
}

message ListWorkspacesRequest {
  string org_id = 1;
  PageRequest page = 2;
}

message ListWorkspacesResponse {
  repeated Workspace workspaces = 1;
  PageResponse page = 2;
}

message GetWorkspaceRequest {
  string org_id = 1;
  string workspace_id = 2;
}

message GetWorkspaceResponse {
  Workspace workspace = 1;
}

message Workspace {
  string id = 1;
  string org_id = 2;
  string created_by = 3;
  string title = 4;
  string created_at = 5;
  ShareMode share_mode = 6;
}

// --- Workspace Sharing ---

message UpdateWorkspaceSharingRequest {
  string workspace_id = 1;
  ShareMode share_mode = 2;
  repeated string user_ids = 3; // Only used when share_mode = "members"
}

message UpdateWorkspaceSharingResponse {}

message ListWorkspaceSharesRequest {
  string workspace_id = 1;
}

message ListWorkspaceSharesResponse {
  ShareMode share_mode = 1;
  repeated WorkspaceShareMember members = 2; // Only populated when share_mode = "members"
}

message WorkspaceShareMember {
  string user_id = 1;
  string username = 2;
  string display_name = 3;
}

// --- Workspace Rename & Delete ---

message RenameWorkspaceRequest {
  string workspace_id = 1;
  string title = 2;
}

message RenameWorkspaceResponse {}

message DeleteWorkspaceRequest {
  string workspace_id = 1;
}

message DeleteWorkspaceResponse {
  repeated string worker_ids = 1; // Workers that had tabs (frontend calls each for cleanup)
}

// --- Workspace Tabs ---

message WorkspaceTab {
  TabType tab_type = 1;
  string tab_id = 2;
  string position = 3;
  string tile_id = 4;
  string worker_id = 5;         // Worker that owns this tab
  string workspace_id = 6;      // Populated by ListTabs; ignored on mutation inputs
}

message AddTabRequest {
  string workspace_id = 1;
  WorkspaceTab tab = 2;
}

message AddTabResponse {}

message RemoveTabRequest {
  string workspace_id = 1;
  TabType tab_type = 2;
  string tab_id = 3;
}

message RemoveTabResponse {}

message ListTabsRequest {
  string org_id = 1;
  // Workspaces to fetch tabs for. Empty = every workspace in the org the caller
  // can read. Unknown / inaccessible IDs are silently dropped so stale sidebar
  // state doesn't produce errors.
  repeated string workspace_ids = 2;
}

message ListTabsResponse {
  repeated WorkspaceTab tabs = 1;
}

// --- Tiling Layout ---

enum SplitDirection {
  SPLIT_DIRECTION_UNSPECIFIED = 0;
  SPLIT_DIRECTION_HORIZONTAL = 1;
  SPLIT_DIRECTION_VERTICAL = 2;
}

message LayoutNode {
  oneof node {
    LayoutSplit split = 1;
    LayoutLeaf leaf = 2;
  }
}

message LayoutSplit {
  string id = 1;
  SplitDirection direction = 2;
  repeated double ratios = 3;
  repeated LayoutNode children = 4;
}

message LayoutLeaf {
  string id = 1;
}

// FloatingWindow represents a detached floating window overlay.
message FloatingWindow {
  string id = 1;
  double x = 2;      // fraction of viewport width (can be negative)
  double y = 3;      // fraction of viewport height (can be negative)
  double width = 4;   // fraction of viewport width, must be > 0
  double height = 5;  // fraction of viewport height, must be > 0
  LayoutNode layout = 6;
  double opacity = 7; // window opacity (0.0–1.0), 0 means default (1.0)
}

message GetLayoutRequest {
  string org_id = 1;
  string workspace_id = 2;
}

message GetLayoutResponse {
  LayoutNode layout = 1;
  repeated FloatingWindow floating_windows = 2;
}

message SaveLayoutRequest {
  string org_id = 1;
  string workspace_id = 2;
  LayoutNode layout = 3;
  repeated WorkspaceTab tabs = 4;
  repeated FloatingWindow floating_windows = 5;
}

message SaveLayoutResponse {}

// --- Multi-Workspace Layout ---

message WorkspaceLayoutEntry {
  string workspace_id = 1;
  LayoutNode layout = 2;
  repeated WorkspaceTab tabs = 3;
  repeated FloatingWindow floating_windows = 4;
}

message SaveMultiLayoutRequest {
  string org_id = 1;
  repeated WorkspaceLayoutEntry entries = 2;
}

message SaveMultiLayoutResponse {}

// --- Worker Inner RPCs ---

// CleanupWorkspaceRequest is sent via E2EE channel to a worker to clean up
// all resources (agents, terminals, worktrees) for a deleted workspace.
message CleanupWorkspaceRequest {
  string workspace_id = 1;
}

message CleanupWorkspaceResponse {
  repeated WorktreeInfo worktrees = 1;
}

// WorktreeInfo describes a worktree found during workspace cleanup.
// Travels via E2EE so the hub never sees filesystem paths.
message WorktreeInfo {
  string worktree_id = 1;
  string worktree_path = 2;
  string branch_name = 3;
}

// --- Tab Workspace Move (Worker Inner RPC) ---

message MoveTabWorkspaceRequest {
  TabType tab_type = 1;
  string tab_id = 2;
  string new_workspace_id = 3;
}

message MoveTabWorkspaceResponse {}

// --- Event Streaming ---

message WatchEventsRequest {
  repeated WatchAgentEntry agents = 1;
  repeated WatchTerminalEntry terminals = 2;
}

message WatchAgentEntry {
  string agent_id = 1;
  int64 after_seq = 2; // Resume from this sequence number (0 = from beginning, -1 = live only)
}

message WatchTerminalEntry {
  string terminal_id = 1;
  // Cumulative byte offset the client has already processed for this
  // terminal's output stream. Backend replays bytes with offset >
  // after_offset. A fresh subscription (or a client that has lost its
  // state) sends 0; the backend responds with a full snapshot marked
  // is_snapshot=true. A resubscribe with an up-to-date offset yields an
  // empty catch-up (no TerminalData event). An offset that has fallen
  // out of the backend's retention window, or is larger than the
  // backend's counter (PTY recreated), is treated the same as 0.
  int64 after_offset = 2;
}

message WatchEventsResponse {
  oneof event {
    AgentEvent agent_event = 1;
    TerminalEvent terminal_event = 2;
  }
}

// AgentEvent wraps agent-related events with the originating agent_id.
// Used both as the wire type in WatchEventsResponse and as the internal
// broadcast type in agentmgr.Watcher.
message AgentEvent {
  string agent_id = 1;
  oneof event {
    AgentChatMessage agent_message = 2;
    AgentStreamChunk stream_chunk = 3;
    AgentStreamEnd stream_end = 4;
    AgentStatusChange status_change = 5;
    AgentControlRequest control_request = 6;
    AgentControlCancelRequest control_cancel = 7;
    AgentMessageError message_error = 8;
    AgentMessageDeleted message_deleted = 9;
    CatchUpComplete catch_up_complete = 10;
  }
}

// CatchUpComplete is a sentinel event sent by the server after all historical
// replay events (messages, status, control requests) for an agent have been
// delivered. The client uses this to transition from catch-up phase to live
// phase, preventing replayed events from triggering side effects like sounds.
message CatchUpComplete {}

// TerminalEvent wraps terminal-related events with the originating terminal_id.
// Used both as the wire type in WatchEventsResponse and as the internal
// broadcast type in terminalmgr.Watcher.
message TerminalEvent {
  string terminal_id = 1;
  oneof event {
    TerminalData data = 2;
    TerminalClosed closed = 3;
    TerminalStatusChange status_change = 4;
  }
}
