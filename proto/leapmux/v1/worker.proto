syntax = "proto3";
package leapmux.v1;

import "google/protobuf/timestamp.proto";
import "leapmux/v1/channel.proto";
import "leapmux/v1/common.proto";
import "leapmux/v1/org_ops.proto";
import "leapmux/v1/workspace.proto";

// WorkerConnectorService is called BY Worker instances on Hub via gRPC.
// Handles registration and the main bidirectional communication stream.
service WorkerConnectorService {
  // Register this worker using a registration key obtained out-of-band
  // from the hub UI. The key travels in the Authorization: Bearer header
  // and is consumed atomically; on success the hub returns a long-lived
  // auth token that the worker uses for subsequent Connect calls.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // Main bidirectional stream for lifecycle notifications and E2EE channel management.
  rpc Connect(stream ConnectRequest) returns (stream ConnectResponse);
}

// WorkerReconcilerService is called BY Workers on Hub via ConnectRPC.
// Authenticated by the worker's auth_token (the same bearer used for
// Connect). Provides the periodic worker-side orphan reconciler with the
// authoritative `workspace_tab_owned` view filtered to the calling worker.
service WorkerReconcilerService {
  rpc ListOwnedTabsForWorker(ListOwnedTabsForWorkerRequest) returns (ListOwnedTabsForWorkerResponse);
}

message ListOwnedTabsForWorkerRequest {}

message ListOwnedTabsForWorkerResponse {
  repeated OwnedTab tabs = 1;
}

message OwnedTab {
  string  org_id       = 1;
  string  workspace_id = 2;
  TabType tab_type     = 3;
  string  tab_id       = 4;
  string  tile_id      = 5;
  string  position     = 6;
}

// WorkerManagementService is called BY Frontend on Hub via ConnectRPC.
// Manages worker registration keys and listings. All RPCs require an
// authenticated user session.
service WorkerManagementService {
  // Mint a new registration key. The key expires in 5 minutes and is
  // automatically extended by the frontend dialog while it stays open.
  rpc CreateRegistrationKey(CreateRegistrationKeyRequest) returns (CreateRegistrationKeyResponse);
  // Push a registration key's expires_at out by another 5 minutes. The
  // hub refuses extensions when more than 2 minutes remain (anti-spam)
  // and refuses to resurrect already-expired keys.
  rpc ExtendRegistrationKey(ExtendRegistrationKeyRequest) returns (ExtendRegistrationKeyResponse);
  // Soft-delete a registration key (sets expires_at into the past). The
  // dialog calls this on close so the key cannot be used afterwards.
  rpc DeleteRegistrationKey(DeleteRegistrationKeyRequest) returns (DeleteRegistrationKeyResponse);
  // Email the registration command to the current user's verified email.
  rpc EmailRegistrationInstructions(EmailRegistrationInstructionsRequest) returns (EmailRegistrationInstructionsResponse);
  // List registered workers for the user's organization.
  rpc ListWorkers(ListWorkersRequest) returns (ListWorkersResponse);
  // Get a single worker's details.
  rpc GetWorker(GetWorkerRequest) returns (GetWorkerResponse);
  // Deregister a worker (graceful shutdown with notification).
  rpc DeregisterWorker(DeregisterWorkerRequest) returns (DeregisterWorkerResponse);
}

// --- Registration messages ---

message RegisterRequest {
  string version = 1;
  bytes public_key = 2;        // Worker's X25519 static public key for E2EE
  bytes mlkem_public_key = 3;  // Worker's ML-KEM-1024 public key for post-quantum key encapsulation
  bytes slhdsa_public_key = 4; // Worker's SLH-DSA-SHAKE-256f public key for post-quantum authentication
}

message RegisterResponse {
  string worker_id = 1;
  string auth_token = 2;
}

// WorkerStatus tracks the lifecycle state of a worker.
enum WorkerStatus {
  WORKER_STATUS_UNSPECIFIED = 0;
  WORKER_STATUS_ACTIVE = 1;
  WORKER_STATUS_DEREGISTERING = 2;
  WORKER_STATUS_DELETED = 3;
}

// NotificationType identifies what action a worker notification conveys.
enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_TYPE_DEREGISTER = 1;
}

// NotificationStatus tracks worker notification delivery state.
enum NotificationStatus {
  NOTIFICATION_STATUS_UNSPECIFIED = 0;
  NOTIFICATION_STATUS_PENDING = 1;
  NOTIFICATION_STATUS_DELIVERED = 2;
  NOTIFICATION_STATUS_FAILED = 3;
}

message CreateRegistrationKeyRequest {}

message CreateRegistrationKeyResponse {
  string registration_key = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message ExtendRegistrationKeyRequest {
  string registration_key = 1;
}

message ExtendRegistrationKeyResponse {
  google.protobuf.Timestamp expires_at = 1;
}

message DeleteRegistrationKeyRequest {
  string registration_key = 1;
}

message DeleteRegistrationKeyResponse {}

message EmailRegistrationInstructionsRequest {
  string registration_key = 1;
  // Pre-rendered command line built by the frontend. The backend embeds
  // this into the email body verbatim so the user can copy-paste straight
  // into a terminal on the worker host.
  string command = 2;
}

message EmailRegistrationInstructionsResponse {}

message ListWorkersRequest {
  PageRequest page = 1;
}

message ListWorkersResponse {
  repeated Worker workers = 1;
  PageResponse page = 2;
}

message GetWorkerRequest {
  string worker_id = 1;
}

message GetWorkerResponse {
  Worker worker = 1;
}

message DeregisterWorkerRequest {
  string worker_id = 1;
}

message DeregisterWorkerResponse {}

message Worker {
  string id = 1;
  bool online = 2;
  string created_at = 3;
  string last_seen_at = 4;
  string registered_by = 5;
  // True for the in-process worker auto-registered by the solo launcher
  // (Server.RegisterWorker). The deregister handler refuses these to
  // keep users from accidentally tearing down the bundled desktop
  // worker; the frontend hides the Deregister... menu item for the same
  // reason.
  bool auto_registered = 6;
  // The org that owns the registering user. Joined on read from
  // users.org_id; populated by the hub in GetWorker / ListWorkers so
  // the `leapmux remote` CLI's universal resolver can derive org_id
  // from worker_id without an extra round-trip. Workers are
  // per-user, and users have a single org, so this is unambiguous.
  string org_id = 7;
}

// --- Bidirectional stream envelope messages ---

// ConnectRequest wraps all messages from Worker to Hub.
message ConnectRequest {
  string request_id = 1;
  oneof payload {
    // Lifecycle
    DeregisterAck deregister_ack = 10;
    WorkspaceTabsSync workspace_tabs_sync = 11;
    // E2EE channels
    ChannelOpenResponse channel_open_resp = 12;
    ChannelMessage channel_message_resp = 13;
    // Health
    Heartbeat heartbeat = 14;
    // Access control
    ChannelAccessUpdateAck channel_access_update_ack = 15;
  }
}

// WorkspaceTabsSync is sent by a worker on connect to reconcile its tab
// state with the hub's CRDT-derived workspace_tab_owned view. The hub
// replies with WorkspaceTabsSyncResponse instructing the worker to drop
// orphaned local entities or update local workspace bookkeeping for
// tabs the CRDT has moved.
message WorkspaceTabsSync {
  repeated WorkspaceTabEntry tabs = 1;
}

message WorkspaceTabEntry {
  string workspace_id = 1;
  TabType tab_type = 2;
  string tab_id = 3;
}

// WorkspaceTabsSyncResponse is the hub's per-tab classification of the
// worker's reported state. Tabs in `orphan_tab_ids` no longer exist
// (or have been tombstoned) in the CRDT; the worker drops the local
// agent / terminal / file-tab. Tabs in `reassignments` exist with a
// different workspace_id; the worker updates its local bookkeeping.
message WorkspaceTabsSyncResponse {
  repeated TabIdent           orphan_tab_ids = 1;
  repeated TabReassignment    reassignments  = 2;
}

message TabReassignment {
  TabIdent tab              = 1;
  string   new_workspace_id = 2;
}

// ConnectResponse wraps all messages from Hub to Worker.
message ConnectResponse {
  string request_id = 1;
  oneof payload {
    // Identity. Always the FIRST message on the stream (see WorkerIdentity).
    WorkerIdentity worker_identity = 10;
    // Lifecycle
    DeregisterNotification deregister = 11;
    HubShuttingDownNotification hub_shutting_down = 12;
    // E2EE channels
    ChannelOpenRequest channel_open = 13;
    ChannelMessage channel_message = 14;
    ChannelCloseNotification channel_close = 15;
    // Health
    Heartbeat heartbeat = 16;
    // Access control
    ChannelAccessUpdate channel_access_update = 17;
    // Workspace-tabs sync result (carried in the same request_id as the
    // worker's WorkspaceTabsSync ConnectRequest payload).
    WorkspaceTabsSyncResponse workspace_tabs_sync_resp = 18;
  }
}

// WorkerIdentity tells a worker who owns it. The Hub sends it as the FIRST message
// on every Connect stream, before the connection is registered with the worker
// manager -- so nothing, in particular no ChannelOpen, can precede it.
//
// The Hub is the only authority: registered_by is sourced from
// workers.registered_by, which is NOT NULL and set at registration. The worker keeps
// no copy of its own, because a second source of truth is what let this value go
// missing: it used to be handed over once in RegisterResponse and cached in a local
// state file, so a file that predated the field, or was hand-edited or truncated,
// left the worker running with no owner -- and requireWorkerOwner gates every
// machine-scoped family (file, git, sysinfo, tunnel) on it, permanently denying the
// worker's own legitimate owner in a way that reads exactly like a genuine
// cross-tenant refusal.
//
// Re-delivered on every connect rather than once at registration, so a reconnect
// re-establishes it and the worker never has to persist it.
message WorkerIdentity {
  // User ID that registered this worker. Never empty.
  string registered_by = 1;
}

// ChannelAccessUpdate is sent by the Hub to a Worker when a new workspace
// becomes accessible to a channel (e.g. after the user creates a workspace).
// The Worker adds the workspace ID to the channel's accessible set and
// replies with ChannelAccessUpdateAck using the request's request_id so the
// Hub can wait for the update to land before responding to the caller.
message ChannelAccessUpdate {
  string channel_id = 1;
  string workspace_id = 2;
}

// ChannelAccessUpdateAck confirms the Worker has added the workspace ID to
// the channel's accessible set. The matching request_id is carried on the
// ConnectRequest envelope.
message ChannelAccessUpdateAck {}

// --- Notification messages (used in bidi stream) ---

message DeregisterNotification {
  string reason = 1;
}

message DeregisterAck {}

// HubShuttingDownNotification is sent by the Hub to all connected workers
// when it is shutting down. Workers should wait retry_delay_seconds before
// attempting to reconnect, giving the Hub time to fully stop.
message HubShuttingDownNotification {
  int32 retry_delay_seconds = 1;
}

// --- Common ---

message Heartbeat {
  int64 timestamp_ms = 1;
  bytes public_key = 2;  // Worker's X25519 public key for E2EE channels (sent with first heartbeat)
  bytes mlkem_public_key = 3;  // Worker's ML-KEM-1024 public key for post-quantum key encapsulation
  bytes slhdsa_public_key = 4;  // Worker's SLH-DSA-SHAKE-256f public key for post-quantum authentication
  EncryptionMode encryption_mode = 5;  // Worker's encryption mode
}

// --- Inner RPC messages (E2EE channel, Frontend ↔ Worker) ---

message GetWorkerSystemInfoRequest {}

message GetWorkerSystemInfoResponse {
  string name = 1;     // Worker display name (from LEAPMUX_WORKER_NAME, defaults to hostname)
  string os = 2;
  string arch = 3;
  string home_dir = 4;
  string version = 5;
  string commit_hash = 6; // Optional short git commit ID injected at build time
  string build_time = 7;  // Optional build timestamp injected at build time
  string branch = 8;      // Optional git ref (branch or tag) injected at build time; empty for detached HEAD
}
