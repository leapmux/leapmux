syntax = "proto3";
package leapmux.v1;

message OpenTerminalRequest {
  string org_id = 1;
  string workspace_id = 2;
  string worker_id = 3;
  string working_dir = 4;
  string shell = 5;
  string shell_start_dir = 6;
  uint32 cols = 7;
  uint32 rows = 8;
  bool create_worktree = 9;     // If true, create a git worktree before starting
  string worktree_branch = 10;  // Branch name for the worktree
}

message OpenTerminalResponse {
  string terminal_id = 1;
  string git_branch = 2;        // Current git branch (if working dir is in a git repo)
  string git_origin_url = 3;    // Remote origin URL (if working dir is in a git repo)
}

message CloseTerminalRequest {
  string org_id = 1;
  string workspace_id = 2;
  string terminal_id = 3;
}

message CloseTerminalResponse {
  bool worktree_cleanup_pending = 1;  // True if worktree is dirty and needs confirmation
  string worktree_path = 2;           // Path of the dirty worktree
  string worktree_id = 3;             // ID for ForceRemoveWorktree/KeepWorktree
}

message SendInputRequest {
  string org_id = 1;
  string workspace_id = 2;
  string terminal_id = 3;
  bytes data = 4;
}

message SendInputResponse {}

message ResizeTerminalRequest {
  string org_id = 1;
  string workspace_id = 2;
  string terminal_id = 3;
  uint32 cols = 4;
  uint32 rows = 5;
}

message ResizeTerminalResponse {}

message ListTerminalsRequest {
  string org_id = 1;
  string workspace_id = 2;
}

message ListTerminalsResponse {
  repeated TerminalInfo terminals = 1;
}

message TerminalInfo {
  string terminal_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
  bytes screen = 4;
  bool exited = 5;
  string working_dir = 6;       // Tab's working directory context
  string shell_start_dir = 7;   // Where the shell started
  string git_branch = 8;        // Current git branch (if in a git repo)
  string git_origin_url = 9;    // Remote origin URL (if in a git repo)
}

message TerminalData {
  bytes data = 1;
  bool is_snapshot = 2; // True for initial screen buffer snapshots; frontend should reset buffer before writing.
}

message TerminalClosed {
  int32 exit_code = 1;
}

message ListAvailableShellsRequest {
  string org_id = 1;
  string workspace_id = 2;
  string worker_id = 3;   // Which worker to query for shells (required)
}

message ListAvailableShellsResponse {
  repeated string shells = 1;       // Available shell paths, e.g., ["/bin/sh", "/bin/bash", "/bin/zsh"]
  string default_shell = 2;         // The default shell ($SHELL or /bin/sh)
}
